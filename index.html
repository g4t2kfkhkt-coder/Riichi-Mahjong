<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>雀魂规则-立直麻将听牌提示与点数计算器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
    body { background-color: #f0f0f0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 20px; }
    .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .section-title { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #3498db; }
    .tile-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-bottom: 15px; }
    .tile { width: 60px; height: 85px; border: 2px solid transparent; border-radius: 5px; cursor: pointer; background-color: #f9f9f9;
      display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transition: all 0.2s; user-select: none; }
    .tile:hover { background-color: #e8f4fd; border-color: #3498db; }
    .tile.selected { background-color: #3498db; color: white; border-color: #2980b9; }
    .tile.man { color: #e74c3c; }
    .tile.pin { color: #d35400; }
    .tile.sou { color: #27ae60; }
    .tile.honor { color: #8e44ad; }
    .tile.red { color: #e74c3c; font-weight: bold; }
    .tile img { width: 52px; height: 72px; object-fit: contain; pointer-events: none; }
    .tile .tile-label { display: none; font-size: 12px; color: #333; margin-top: 4px; text-align: center; }
    .hand-display, .meld-display { min-height: 100px; border: 1px dashed #ccc; padding: 10px; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .tile-inline { width: 32px; height: 44px; object-fit: contain; vertical-align: middle; margin-right: 4px; }
    .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
    button:hover { background-color: #27ae60; }
    button.danger { background-color: #e74c3c; }
    button.danger:hover { background-color: #c0392b; }
    .result-section { background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .result-item { margin-bottom: 15px; padding: 12px; background-color: white; border-left: 4px solid #3498db; border-radius: 0 4px 4px 0; }
    .result-item h4 { margin-bottom: 8px; color: #2c3e50; }
    .point-text { font-size: 16px; font-weight: 500; margin: 4px 0; }
    .yaku-list { color: #666; font-size: 14px; margin-top: 6px; }
    .wind-selector { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .wind-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; cursor: pointer; user-select: none; }
    .wind-btn.active { background-color: #3498db; color: white; border-color: #2980b9; }
    .calc-type { margin: 20px 0; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .calc-type label { font-size: 16px; cursor: pointer; }
    .muted { color:#888; font-size: 12px; }
  </style>
</head>

<body>
<div class="container">
  <h1>雀魂规则-立直麻将听牌提示与点数计算器</h1>

  <!-- 场风与自风选择 -->
  <div class="section">
    <div class="section-title">场风与自风</div>
    <div>
      <label>场风：</label>
      <div class="wind-selector" id="fieldWind">
        <div class="wind-btn" data-wind="west">东</div>
        <div class="wind-btn" data-wind="south">南</div>
        <div class="wind-btn" data-wind="east">西</div>
        <div class="wind-btn" data-wind="north">北</div>
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>自风：</label>
      <div class="wind-selector" id="seatWind">
        <div class="wind-btn" data-wind="west">东</div>
        <div class="wind-btn" data-wind="south">南</div>
        <div class="wind-btn" data-wind="east">西</div>
        <div class="wind-btn" data-wind="north">北</div>
      </div>
    </div>
    <div class="muted">提示：请保证 index.html 与 svg/ 文件夹同级，否则图片路径需要改。</div>
  </div>

  <!-- 和牌类型选择 -->
  <div class="section">
    <div class="section-title">和牌类型</div>
    <div class="calc-type">
      <label><input type="radio" name="winType" value="tsumo" checked> 自摸和</label>
      <label><input type="radio" name="winType" value="ron"> 荣和</label>
      <label><input type="checkbox" id="riichi" checked> 立直（门清限定）</label>
    </div>
  </div>

  <!-- 手牌选择 -->
  <div class="section">
    <div class="section-title">选择手牌（最多13张）</div>
    <div class="tile-selector" id="handTiles"></div>
    <div class="hand-display" id="handDisplay">已选手牌：</div>
    <div class="btn-group">
      <button id="clearHand">清空手牌</button>
    </div>
  </div>

  <!-- 副露选择 -->
  <div class="section">
    <div class="section-title">副露（吃/碰/大明杠）</div>
    <div class="tile-selector" id="meldTiles"></div>
    <div class="meld-display" id="meldDisplay">已选副露：</div>
    <div class="btn-group">
      <button id="addMeld">添加副露</button>
      <button id="clearMeld" class="danger">清空副露</button>
    </div>
  </div>

  <!-- 暗杠选择 -->
  <div class="section">
    <div class="section-title">暗杠</div>
    <div class="tile-selector" id="ankanTiles"></div>
    <div class="meld-display" id="ankanDisplay">已选暗杠：</div>
    <div class="btn-group">
      <button id="addAnkan">添加暗杠</button>
      <button id="clearAnkan" class="danger">清空暗杠</button>
    </div>
  </div>

  <!-- 宝牌与里宝牌 -->
  <div class="section">
    <div class="section-title">宝牌与里宝牌指示牌</div>
    <div>
      <label>宝牌指示牌：</label>
      <div class="tile-selector" id="doraTiles"></div>
      <div class="hand-display" id="doraDisplay">已选宝牌：</div>
    </div>
    <div style="margin-top:15px;">
      <label>里宝牌指示牌（立直和牌生效）：</label>
      <div class="tile-selector" id="uradoraTiles"></div>
      <div class="hand-display" id="uradoraDisplay">已选里宝牌：</div>
    </div>
  </div>

  <!-- 计算按钮 -->
  <div style="text-align:center; margin:30px 0;">
    <button id="calculate" style="font-size:20px; padding:15px 30px; background-color: #3498db;">计算听牌与点数</button>
  </div>

  <!-- 结果显示 -->
  <div class="result-section" id="resultSection" style="display:none;">
    <div class="section-title">计算结果（雀魂规则）</div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
  // 牌库定义 - 对应SVG文件名
  const allTiles = [
    // 万子 0m=红五万
    {id: '1m', name: '一萬', type: 'man', suit: 'm', num: 1, is幺九: true},
    {id: '2m', name: '二萬', type: 'man', suit: 'm', num: 2, is幺九: false},
    {id: '3m', name: '三萬', type: 'man', suit: 'm', num: 3, is幺九: false},
    {id: '4m', name: '四萬', type: 'man', suit: 'm', num: 4, is幺九: false},
    {id: '5m', name: '五萬', type: 'man', suit: 'm', num: 5, is幺九: false},
    {id: '0m', name: '红五萬', type: 'man', suit: 'm', num: 5, is幺九: false, red: true},
    {id: '6m', name: '六萬', type: 'man', suit: 'm', num: 6, is幺九: false},
    {id: '7m', name: '七萬', type: 'man', suit: 'm', num: 7, is幺九: false},
    {id: '8m', name: '八萬', type: 'man', suit: 'm', num: 8, is幺九: false},
    {id: '9m', name: '九萬', type: 'man', suit: 'm', num: 9, is幺九: true},

    // 筒子 0p=红五筒
    {id: '1p', name: '一筒', type: 'pin', suit: 'p', num: 1, is幺九: true},
    {id: '2p', name: '二筒', type: 'pin', suit: 'p', num: 2, is幺九: false},
    {id: '3p', name: '三筒', type: 'pin', suit: 'p', num: 3, is幺九: false},
    {id: '4p', name: '四筒', type: 'pin', suit: 'p', num: 4, is幺九: false},
    {id: '5p', name: '五筒', type: 'pin', suit: 'p', num: 5, is幺九: false},
    {id: '0p', name: '红五筒', type: 'pin', suit: 'p', num: 5, is幺九: false, red: true},
    {id: '6p', name: '六筒', type: 'pin', suit: 'p', num: 6, is幺九: false},
    {id: '7p', name: '七筒', type: 'pin', suit: 'p', num: 7, is幺九: false},
    {id: '8p', name: '八筒', type: 'pin', suit: 'p', num: 8, is幺九: false},
    {id: '9p', name: '九筒', type: 'pin', suit: 'p', num: 9, is幺九: true},

    // 索子 0s=红五索
    {id: '1s', name: '一索', type: 'sou', suit: 's', num: 1, is幺九: true},
    {id: '2s', name: '二索', type: 'sou', suit: 's', num: 2, is幺九: false},
    {id: '3s', name: '三索', type: 'sou', suit: 's', num: 3, is幺九: false},
    {id: '4s', name: '四索', type: 'sou', suit: 's', num: 4, is幺九: false},
    {id: '5s', name: '五索', type: 'sou', suit: 's', num: 5, is幺九: false},
    {id: '0s', name: '红五索', type: 'sou', suit: 's', num: 5, is幺九: false, red: true},
    {id: '6s', name: '六索', type: 'sou', suit: 's', num: 6, is幺九: false},
    {id: '7s', name: '七索', type: 'sou', suit: 's', num: 7, is幺九: false},
    {id: '8s', name: '八索', type: 'sou', suit: 's', num: 8, is幺九: false},
    {id: '9s', name: '九索', type: 'sou', suit: 's', num: 9, is幺九: true},

    // 字牌（注意：你原始命名 west=东 south=南 east=西 north=北）
    {id: 'west',  name: '東', type: 'honor', honor: 'east',  is风牌: true,  is三元: false, is幺九: true},
    {id: 'south', name: '南', type: 'honor', honor: 'south', is风牌: true,  is三元: false, is幺九: true},
    {id: 'east',  name: '西', type: 'honor', honor: 'west',  is风牌: true,  is三元: false, is幺九: true},
    {id: 'north', name: '北', type: 'honor', honor: 'north', is风牌: true,  is三元: false, is幺九: true},
    {id: 'white', name: '白', type: 'honor', honor: 'haku',  is风牌: false, is三元: true,  is幺九: true},
    {id: 'rich',  name: '發', type: 'honor', honor: 'hatsu', is风牌: false, is三元: true,  is幺九: true},
    {id: 'red',   name: '中', type: 'honor', honor: 'chun',  is风牌: false, is三元: true,  is幺九: true}
  ];

  // 全局状态
  let state = {
    fieldWind: 'west', // 东
    seatWind: 'west',  // 东
    hand: [],
    melds: [],
    ankan: [],
    dora: [],
    uradora: [],
    winType: 'tsumo',
    isRiichi: true
  };

  // ✅ 核心修复：图片路径用 ./svg/xxx.svg（GitHub Pages 更稳定）
  function tileToSvg(tile) {
    return `./svg/${encodeURIComponent(tile.id)}.svg`;
  }

  // 行内小牌渲染
  function renderInlineTiles(tiles) {
    return tiles.length
      ? tiles.map(t => `<img class="tile-inline" src="${tileToSvg(t)}" alt="${t.name}" title="${t.name}"
            onerror="this.style.display='none';console.warn('图片加载失败:', this.src);" />`).join('')
      : '(无)';
  }

  function getTileById(id) {
    return allTiles.find(t => t.id === id) || null;
  }

  function isMenzen() {
    return state.melds.length === 0;
  }

  // 初始化牌选择器
  function initTileSelectors() {
    const handTiles = document.getElementById('handTiles');
    const meldTiles = document.getElementById('meldTiles');
    const ankanTiles = document.getElementById('ankanTiles');
    const doraTiles = document.getElementById('doraTiles');
    const uradoraTiles = document.getElementById('uradoraTiles');

    function createTileElements(container, clickHandler) {
      container.innerHTML = '';
      allTiles.forEach(tile => {
        const tileEl = document.createElement('div');
        tileEl.className = `tile ${tile.type} ${tile.red ? 'red' : ''}`;
        tileEl.dataset.tileId = tile.id;
        tileEl.title = tile.name;

        // ✅ onerror兜底：如果某张 svg 没有，会显示文字
        tileEl.innerHTML = `
          <img src="${tileToSvg(tile)}" alt="${tile.name}"
               onerror="this.style.display='none'; this.parentElement.querySelector('.tile-label').style.display='block'; console.warn('缺少SVG:', '${tile.id}', this.src);" />
          <span class="tile-label">${tile.name}<br><span class="muted">(${tile.id})</span></span>
        `;
        tileEl.addEventListener('click', () => clickHandler(tile));
        container.appendChild(tileEl);
      });
    }

    createTileElements(handTiles, addToHand);
    createTileElements(meldTiles, selectForMeld);
    createTileElements(ankanTiles, selectForAnkan);
    createTileElements(doraTiles, addToDora);
    createTileElements(uradoraTiles, addToUradora);
  }

  // 手牌操作
  let selectedForMeld = [];
  let selectedForAnkan = null;

  function addToHand(tile) {
    if (state.hand.length >= 13) {
      alert('手牌最多13张！');
      return;
    }
    state.hand.push(tile);
    updateHandDisplay();
  }

  function updateHandDisplay() {
    document.getElementById('handDisplay').innerHTML = '已选手牌：' + renderInlineTiles(state.hand);
  }

  // 副露操作
  function selectForMeld(tile) {
    if (selectedForMeld.length >= 3) {
      alert('副露每组最多3张！');
      return;
    }
    selectedForMeld.push(tile);
    updateMeldArea();
  }

  function addMeld() {
    if (selectedForMeld.length !== 3) {
      alert('请选择3张牌组成副露！');
      return;
    }
    state.melds.push([...selectedForMeld]);
    selectedForMeld = [];
    updateMeldArea();
    if (state.isRiichi) {
      alert('立直为门清限定！已自动取消立直');
      state.isRiichi = false;
      document.getElementById('riichi').checked = false;
    }
  }

  function updateMeldArea() {
    const display = document.getElementById('meldDisplay');
    const meldsHtml = state.melds.map(m => `[${renderInlineTiles(m)}]`).join(' ') || '(无)';
    const curHtml = renderInlineTiles(selectedForMeld) || '(无)';
    display.innerHTML = `<div><b>已选副露：</b>${meldsHtml}</div><div style="margin-top:6px;"><b>当前选择：</b>${curHtml}</div>`;
  }

  // 暗杠操作
  function selectForAnkan(tile) {
    selectedForAnkan = tile;
    const display = document.getElementById('ankanDisplay');
    display.innerHTML =
      `<div><b>已选暗杠：</b>${renderInlineTiles(state.ankan) || '(无)'}</div>
       <div style="margin-top:6px;"><b>当前选择：</b>${renderInlineTiles([tile])}（点击添加暗杠）</div>`;
  }

  function addAnkan() {
    if (!selectedForAnkan) {
      alert('请先选择一张牌作为暗杠！');
      return;
    }
    state.ankan.push(selectedForAnkan);
    selectedForAnkan = null;
    updateAnkanDisplay();
  }

  function updateAnkanDisplay() {
    document.getElementById('ankanDisplay').innerHTML = `<b>已选暗杠：</b>${renderInlineTiles(state.ankan) || '(无)'}`;
  }

  // 宝牌操作
  function addToDora(tile) {
    state.dora.push(tile);
    updateDoraDisplay();
  }
  function updateDoraDisplay() {
    document.getElementById('doraDisplay').innerHTML = '已选宝牌：' + renderInlineTiles(state.dora);
  }

  function addToUradora(tile) {
    state.uradora.push(tile);
    updateUradoraDisplay();
  }
  function updateUradoraDisplay() {
    document.getElementById('uradoraDisplay').innerHTML = '已选里宝牌：' + renderInlineTiles(state.uradora);
  }

  // 风选择初始化
  function initWindSelectors() {
    const fieldWind = document.getElementById('fieldWind');
    const seatWind = document.getElementById('seatWind');

    const setWindActive = (container, wind) => {
      container.querySelectorAll('.wind-btn')
        .forEach(b => b.classList.toggle('active', b.dataset.wind === wind));
    };

    fieldWind.addEventListener('click', (e) => {
      if (e.target.classList.contains('wind-btn')) {
        state.fieldWind = e.target.dataset.wind;
        setWindActive(fieldWind, state.fieldWind);
      }
    });

    seatWind.addEventListener('click', (e) => {
      if (e.target.classList.contains('wind-btn')) {
        state.seatWind = e.target.dataset.wind;
        setWindActive(seatWind, state.seatWind);
      }
    });

    setWindActive(fieldWind, 'west');
    setWindActive(seatWind, 'west');
  }

  // 和牌类型选择监听
  function initWinType() {
    document.querySelectorAll('input[name="winType"]').forEach(radio => {
      radio.addEventListener('change', (e) => state.winType = e.target.value);
    });
    document.getElementById('riichi').addEventListener('change', (e) => {
      state.isRiichi = e.target.checked;
      if (state.isRiichi && !isMenzen()) {
        alert('立直为门清限定！取消立直或清空副露');
        e.target.checked = false;
        state.isRiichi = false;
      }
    });
  }

  // ====== 听牌判断（简化版：遍历所有牌尝试和牌） ======
  function analyzeTenpai() {
    const allPossibleTiles = allTiles.filter(t => !t.red); // 排除红宝牌作为和牌张
    const tenpaiTiles = [];

    for (const tile of allPossibleTiles) {
      const testHand = [...state.hand, tile];
      if (isValidMahjongHand(testHand) || isSevenPairs(testHand) || isKokushiMusou(testHand)) {
        tenpaiTiles.push(tile);
      }
    }
    return tenpaiTiles.length ? tenpaiTiles : [{name: '无听牌', id: 'none'}];
  }

  // 牌型验证：普通牌型（4面子+1雀头）
  function isValidMahjongHand(tiles) {
    if (tiles.length !== 14) return false;
    const sorted = [...tiles].sort((a, b) => {
      if (a.suit !== b.suit) return (a.suit || '').localeCompare(b.suit || '');
      return (a.num || 0) - (b.num || 0);
    });

    for (let i = 0; i < sorted.length - 1; i++) {
      if (sorted[i].id === sorted[i+1].id) {
        const rest = [...sorted.slice(0, i), ...sorted.slice(i+2)];
        if (checkMentsu(rest)) return true;
      }
    }
    return false;
  }

  function checkMentsu(tiles) {
    if (tiles.length === 0) return true;
    const first = tiles[0];

    // 刻子
    const same = tiles.filter(t => t.id === first.id);
    if (same.length >= 3) {
      const rest = removeTiles(tiles, [first.id, first.id, first.id]);
      if (checkMentsu(rest)) return true;
    }

    // 顺子（仅数牌）
    if (first.type !== 'honor') {
      const id2 = `${first.num+1}${first.suit}`;
      const id3 = `${first.num+2}${first.suit}`;
      if (tiles.some(t => t.id === id2) && tiles.some(t => t.id === id3)) {
        const rest = removeTiles(tiles, [first.id, id2, id3]);
        if (checkMentsu(rest)) return true;
      }
    }
    return false;
  }

  function removeTiles(tiles, ids) {
    const arr = [...tiles];
    ids.forEach(id => {
      const idx = arr.findIndex(t => t.id === id);
      if (idx >= 0) arr.splice(idx, 1);
    });
    return arr;
  }

  // 七对子
  function isSevenPairs(tiles) {
    if (tiles.length !== 14) return false;
    const count = {};
    tiles.forEach(t => count[t.id] = (count[t.id] || 0) + 1);
    return Object.values(count).filter(c => c === 2).length === 7;
  }

  // 国士无双（简单判断）
  function isKokushiMusou(tiles) {
    if (tiles.length !== 14) return false;
    const yaochuuIds = allTiles.filter(t => t.is幺九).map(t => t.id);
    const unique = new Set(tiles.map(t => t.id));
    if (unique.size !== 13) return false;
    return yaochuuIds.every(id => unique.has(id));
  }

  // ====== 番/符/点数：这里保留你的结构（简化可用版） ======
  // 注意：你的原始代码很长且在你粘贴处被截断；
  // 这里给一个“能跑通 + 能展示”的版本，后续你要更完整再逐项补齐。

  function calculateDora(hand, isUra = false) {
    const doraIndicators = isUra ? state.uradora : state.dora;
    if (doraIndicators.length === 0) return 0;
    let doraCount = 0;

    const doraTiles = doraIndicators.map(ind => {
      if (ind.type === 'honor') {
        const honorOrder = ['west','south','east','north','white','rich','red'];
        const idx = honorOrder.findIndex(id => id === ind.id);
        return getTileById(honorOrder[(idx + 1) % 7]);
      } else {
        const num = ind.num === 9 ? 1 : ind.num + 1;
        return allTiles.find(t => t.suit === ind.suit && t.num === num && !t.red);
      }
    }).filter(Boolean);

    hand.forEach(t => {
      if (t.red) doraCount += 1;
      if (doraTiles.some(d => d.id === t.id)) doraCount += 1;
    });
    return doraCount;
  }

  function calculateHan(winTile) {
    const hand = [...state.hand, winTile];
    const hanList = [];
    let han = 0;

    // 立直
    if (state.isRiichi && isMenzen()) { hanList.push({name:'立直', han:1}); han += 1; }
    // 门清自摸
    if (state.winType === 'tsumo' && isMenzen()) { hanList.push({name:'门清自摸和', han:1}); han += 1; }
    // 断幺九（简化：手牌不含幺九/字牌）
    if (!hand.some(t => t.is幺九)) { hanList.push({name:'断幺九', han:1}); han += 1; }

    const doraHan = calculateDora(hand, false) + (state.isRiichi ? calculateDora(hand, true) : 0);

    return { totalHan: han + doraHan, hanList, doraHan, yakuman: null };
  }

  function calculateFu(winTile, hanResult) {
    // 简化符：至少20符，七对子25符，门清荣和平和30符（此处仅做演示）
    const hand = [...state.hand, winTile];
    if (isSevenPairs(hand)) return 25;
    let fu = 20;
    if (state.winType === 'ron' && isMenzen()) fu += 10; // 门清荣和符（简化）
    // 进10
    fu = Math.ceil(fu / 10) * 10;
    return fu;
  }

  function calcPoints(han, fu) {
    // 简化点数（演示用）：按基本点 = fu * 2^(han+2) 计算，再自摸/荣和分配
    // 实际雀魂规则还有满贯/跳满/倍满/三倍满/役满上限，这里先做可跑通版本
    const base = fu * Math.pow(2, han + 2);

    if (state.winType === 'ron') {
      return {desc: `荣和：约 ${Math.ceil(base * 4 / 100) * 100} 点`, total: Math.ceil(base * 4 / 100) * 100};
    } else {
      // 自摸：非亲/亲家分配差异这里先不细分
      return {desc: `自摸：约 ${Math.ceil(base * 2 / 100) * 100}/${Math.ceil(base * 2 / 100) * 100} 点`, total: Math.ceil(base * 4 / 100) * 100};
    }
  }

  // ====== 计算入口 ======
  function calculate() {
    if (state.hand.length !== 13) {
      alert('请先选择13张手牌（听牌计算以13张为准）');
      return;
    }

    const waits = analyzeTenpai();
    const resultSection = document.getElementById('resultSection');
    const resultContent = document.getElementById('resultContent');

    resultSection.style.display = 'block';
    resultContent.innerHTML = '';

    if (waits.length === 1 && waits[0].id === 'none') {
      resultContent.innerHTML = `<div class="result-item"><h4>听牌结果</h4><div class="point-text">当前无听牌</div></div>`;
      return;
    }

    waits.forEach(tile => {
      const hanRes = calculateHan(tile);
      const fu = calculateFu(tile, hanRes);
      const pts = calcPoints(hanRes.totalHan, fu);

      const yakuText = [
        ...hanRes.hanList.map(x => `${x.name}（${x.han}翻）`),
        (hanRes.doraHan ? `宝牌/里宝牌/赤宝牌合计（${hanRes.doraHan}翻）` : '')
      ].filter(Boolean).join('，');

      resultContent.innerHTML += `
        <div class="result-item">
          <h4>和牌张：${tile.name} <span class="muted">(${tile.id})</span></h4>
          <div class="point-text">听牌：${renderInlineTiles([tile])}</div>
          <div class="point-text">翻数：${hanRes.totalHan} 翻；符数：${fu} 符</div>
          <div class="point-text">${pts.desc}</div>
          <div class="yaku-list">役种：${yakuText || '（无/未判定）'}</div>
        </div>
      `;
    });
  }

  // ====== 清空/绑定事件 ======
  function bindButtons() {
    document.getElementById('clearHand').addEventListener('click', () => {
      state.hand = [];
      updateHandDisplay();
    });

    document.getElementById('addMeld').addEventListener('click', addMeld);

    document.getElementById('clearMeld').addEventListener('click', () => {
      state.melds = [];
      selectedForMeld = [];
      updateMeldArea();
    });

    document.getElementById('addAnkan').addEventListener('click', addAnkan);

    document.getElementById('clearAnkan').addEventListener('click', () => {
      state.ankan = [];
      selectedForAnkan = null;
      updateAnkanDisplay();
    });

    document.getElementById('calculate').addEventListener('click', calculate);
  }

  // ====== 初始化 ======
  function init() {
    initTileSelectors();
    initWindSelectors();
    initWinType();
    bindButtons();
    updateHandDisplay();
    updateMeldArea();
    updateAnkanDisplay();
    updateDoraDisplay();
    updateUradoraDisplay();
  }

  init();
</script>
