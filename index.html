<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>日本立直麻将听牌提示与点数计算器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background-color: #f0f0f0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    .section {
      margin-bottom: 30px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .section-title {
      font-size: 18px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 2px solid #3498db;
    }
    .tile-selector {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
      gap: 8px;
      margin-bottom: 15px;
    }
    .tile {
      width: 60px;
      height: 85px;
      border: 2px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      background-color: #f9f9f9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.2s;
      user-select: none;
    }
    .tile:hover {
      background-color: #e8f4fd;
      border-color: #3498db;
    }
    .tile.selected {
      background-color: #3498db;
      color: white;
      border-color: #2980b9;
    }

    .tile.man { color: #e74c3c; }
    .tile.pin { color: #d35400; }
    .tile.sou { color: #27ae60; }
    /* 修复：原来是 .tile. honor（中间多了空格） */
    .tile.honor { color: #8e44ad; }

    .tile.red { color: #e74c3c; font-weight: bold; }

    /* 牌面图片显示 */
    .tile img {
      width: 52px;
      height: 72px;
      object-fit: contain;
      pointer-events: none;
    }
    .tile .tile-label {
      display: none; /* 默认不显示文字 */
    }

    .hand-display, .meld-display {
      min-height: 100px;
      border: 1px dashed #ccc;
      padding: 10px;
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    /* 已选区域小图 */
    .tile-inline {
      width: 32px;
      height: 44px;
      object-fit: contain;
      vertical-align: middle;
      margin-right: 4px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      padding: 10px 20px;
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #27ae60;
    }
    button.danger {
      background-color: #e74c3c;
    }
    button.danger:hover {
      background-color: #c0392b;
    }
    .result-section {
      background-color: #f8f9fa;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .result-item {
      margin-bottom: 10px;
      padding: 10px;
      background-color: white;
      border-left: 4px solid #3498db;
    }
    .wind-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .wind-btn {
      padding: 8px 15px;
      background-color: #ecf0f1;
      border: 1px solid #bdc3c7;
      border-radius: 5px;
      cursor: pointer;
      user-select: none;
    }
    .wind-btn.active {
      background-color: #3498db;
      color: white;
      border-color: #2980b9;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>日本立直麻将听牌提示与点数计算器</h1>

  <!-- 场风与自风选择 -->
  <div class="section">
    <div class="section-title">场风与自风</div>
    <div>
      <label>场风：</label>
      <!-- 注意：data-wind 已改成“文件名id”（按你给的映射） -->
      <div class="wind-selector" id="fieldWind">
        <div class="wind-btn" data-wind="west">东</div>
        <div class="wind-btn" data-wind="south">南</div>
        <div class="wind-btn" data-wind="east">西</div>
        <div class="wind-btn" data-wind="north">北</div>
      </div>
    </div>
    <div style="margin-top:10px;">
      <label>自风：</label>
      <div class="wind-selector" id="seatWind">
        <div class="wind-btn" data-wind="west">东</div>
        <div class="wind-btn" data-wind="south">南</div>
        <div class="wind-btn" data-wind="east">西</div>
        <div class="wind-btn" data-wind="north">北</div>
      </div>
    </div>
  </div>

  <!-- 手牌选择 -->
  <div class="section">
    <div class="section-title">选择手牌（最多13张）</div>
    <div class="tile-selector" id="handTiles"></div>
    <div class="hand-display" id="handDisplay">已选手牌：</div>
    <div class="btn-group">
      <button id="clearHand">清空手牌</button>
    </div>
  </div>

  <!-- 副露选择 -->
  <div class="section">
    <div class="section-title">副露（吃/碰/大明杠）</div>
    <div class="tile-selector" id="meldTiles"></div>
    <div class="meld-display" id="meldDisplay">已选副露：</div>
    <div class="btn-group">
      <button id="addMeld">添加副露</button>
      <button id="clearMeld" class="danger">清空副露</button>
    </div>
  </div>

  <!-- 暗杠选择 -->
  <div class="section">
    <div class="section-title">暗杠</div>
    <div class="tile-selector" id="ankanTiles"></div>
    <div class="meld-display" id="ankanDisplay">已选暗杠：</div>
    <div class="btn-group">
      <button id="addAnkan">添加暗杠</button>
      <button id="clearAnkan" class="danger">清空暗杠</button>
    </div>
  </div>

  <!-- 宝牌与里宝牌 -->
  <div class="section">
    <div class="section-title">宝牌与里宝牌指示牌</div>
    <div>
      <label>宝牌指示牌：</label>
      <div class="tile-selector" id="doraTiles"></div>
      <div class="hand-display" id="doraDisplay">已选宝牌：</div>
    </div>
    <div style="margin-top:15px;">
      <label>里宝牌指示牌：</label>
      <div class="tile-selector" id="uradoraTiles"></div>
      <div class="hand-display" id="uradoraDisplay">已选里宝牌：</div>
    </div>
  </div>

  <!-- 计算按钮 -->
  <div style="text-align:center; margin:30px 0;">
    <button id="calculate" style="font-size:20px; padding:15px 30px;">计算听牌与点数</button>
  </div>

  <!-- 结果显示 -->
  <div class="result-section" id="resultSection" style="display:none;">
    <div class="section-title">计算结果</div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
  /**
   * 牌 id 已统一成 svg 文件名（不含 .svg）
   * 数牌：0m/1m..9m, 0p/1p..9p, 0s/1s..9s
   * 字牌：west/south/east/north/white/rich/red（按你给的映射）
   */
  const allTiles = [
    // 万子
    {id: '1m', name: '一萬', type: 'man', suit: 'm', num: 1},
    {id: '2m', name: '二萬', type: 'man', suit: 'm', num: 2},
    {id: '3m', name: '三萬', type: 'man', suit: 'm', num: 3},
    {id: '4m', name: '四萬', type: 'man', suit: 'm', num: 4},
    {id: '5m', name: '五萬', type: 'man', suit: 'm', num: 5},
    {id: '0m', name: '红五萬', type: 'man', suit: 'm', num: 5, red: true},
    {id: '6m', name: '六萬', type: 'man', suit: 'm', num: 6},
    {id: '7m', name: '七萬', type: 'man', suit: 'm', num: 7},
    {id: '8m', name: '八萬', type: 'man', suit: 'm', num: 8},
    {id: '9m', name: '九萬', type: 'man', suit: 'm', num: 9},

    // 筒子
    {id: '1p', name: '一筒', type: 'pin', suit: 'p', num: 1},
    {id: '2p', name: '二筒', type: 'pin', suit: 'p', num: 2},
    {id: '3p', name: '三筒', type: 'pin', suit: 'p', num: 3},
    {id: '4p', name: '四筒', type: 'pin', suit: 'p', num: 4},
    {id: '5p', name: '五筒', type: 'pin', suit: 'p', num: 5},
    {id: '0p', name: '红五筒', type: 'pin', suit: 'p', num: 5, red: true},
    {id: '6p', name: '六筒', type: 'pin', suit: 'p', num: 6},
    {id: '7p', name: '七筒', type: 'pin', suit: 'p', num: 7},
    {id: '8p', name: '八筒', type: 'pin', suit: 'p', num: 8},
    {id: '9p', name: '九筒', type: 'pin', suit: 'p', num: 9},

    // 索子
    {id: '1s', name: '一索', type: 'sou', suit: 's', num: 1},
    {id: '2s', name: '二索', type: 'sou', suit: 's', num: 2},
    {id: '3s', name: '三索', type: 'sou', suit: 's', num: 3},
    {id: '4s', name: '四索', type: 'sou', suit: 's', num: 4},
    {id: '5s', name: '五索', type: 'sou', suit: 's', num: 5},
    {id: '0s', name: '红五索', type: 'sou', suit: 's', num: 5, red: true},
    {id: '6s', name: '六索', type: 'sou', suit: 's', num: 6},
    {id: '7s', name: '七索', type: 'sou', suit: 's', num: 7},
    {id: '8s', name: '八索', type: 'sou', suit: 's', num: 8},
    {id: '9s', name: '九索', type: 'sou', suit: 's', num: 9},

    // 字牌（按你给的文件名映射：west=东, south=南, east=西, north=北）
    {id: 'west',  name: '東', type: 'honor', honor: 'east'},
    {id: 'south', name: '南', type: 'honor', honor: 'south'},
    {id: 'east',  name: '西', type: 'honor', honor: 'west'},
    {id: 'north', name: '北', type: 'honor', honor: 'north'},
    {id: 'white', name: '白', type: 'honor', honor: 'haku'},
    {id: 'rich',  name: '發', type: 'honor', honor: 'hatsu'},
    {id: 'red',   name: '中', type: 'honor', honor: 'chun'}
  ];

  // 全局状态（场风/自风也改为新的风id）
  let state = {
    fieldWind: 'west', // 东
    seatWind: 'west',  // 东
    hand: [],
    melds: [],
    ankan: [],
    dora: [],
    uradora: []
  };

  // 统一根据 id 取 svg
  function tileToSvg(tile) {
    return `svg/${tile.id}.svg`;
  }

  // 已选区域渲染小图
  function renderInlineTiles(tiles) {
    return tiles.map(t => {
      const src = tileToSvg(t);
      return `<img class="tile-inline" src="${src}" alt="${t.name}" title="${t.name}">`;
    }).join('');
  }

  // 初始化牌选择器
  function initTileSelectors() {
    const handTiles = document.getElementById('handTiles');
    const meldTiles = document.getElementById('meldTiles');
    const ankanTiles = document.getElementById('ankanTiles');
    const doraTiles = document.getElementById('doraTiles');
    const uradoraTiles = document.getElementById('uradoraTiles');

    function createTileElements(container, clickHandler) {
      container.innerHTML = '';
      allTiles.forEach(tile => {
        const tileEl = document.createElement('div');
        tileEl.className = `tile ${tile.type} ${tile.red ? 'red' : ''}`;
        tileEl.dataset.tileId = tile.id;
        tileEl.title = tile.name;

        tileEl.innerHTML = `
          <img src="${tileToSvg(tile)}" alt="${tile.name}">
          <span class="tile-label">${tile.name}</span>
        `;

        tileEl.addEventListener('click', () => clickHandler(tile));
        container.appendChild(tileEl);
      });
    }

    createTileElements(handTiles, addToHand);
    createTileElements(meldTiles, selectForMeld);
    createTileElements(ankanTiles, selectForAnkan);
    createTileElements(doraTiles, addToDora);
    createTileElements(uradoraTiles, addToUradora);
  }

  // 手牌操作
  function addToHand(tile) {
    if (state.hand.length >= 13) {
      alert('手牌最多13张');
      return;
    }
    state.hand.push(tile);
    updateHandDisplay();
  }

  function updateHandDisplay() {
    const display = document.getElementById('handDisplay');
    display.innerHTML = '已选手牌：' + renderInlineTiles(state.hand);
  }

  // 副露操作
  let selectedForMeld = [];
  function selectForMeld(tile) {
    if (selectedForMeld.length >= 3) {
      alert('副露最多3张');
      return;
    }
    selectedForMeld.push(tile);
    updateMeldArea();
  }

  function addMeld() {
    if (selectedForMeld.length !== 3) {
      alert('请选择3张牌作为副露');
      return;
    }
    state.melds.push([...selectedForMeld]);
    selectedForMeld = [];
    updateMeldArea();
  }

  // 用同一个区域同时显示 “已选副露” + “当前选择”
  function updateMeldArea() {
    const display = document.getElementById('meldDisplay');
    const meldsHtml = state.melds.length
      ? state.melds.map(m => `[${renderInlineTiles(m)}]`).join(' ')
      : '(无)';
    const curHtml = selectedForMeld.length
      ? renderInlineTiles(selectedForMeld)
      : '(无)';

    display.innerHTML = `
      <div style="width:100%"><b>已选副露：</b>${meldsHtml}</div>
      <div style="width:100%; margin-top:6px;"><b>当前选择：</b>${curHtml}</div>
    `;
  }

  // 暗杠操作
  let selectedForAnkan = null;
  function selectForAnkan(tile) {
    selectedForAnkan = tile;
    const display = document.getElementById('ankanDisplay');
    display.innerHTML = `
      <div style="width:100%"><b>已选暗杠：</b>${renderInlineTiles(state.ankan) || '(无)'}</div>
      <div style="width:100%; margin-top:6px;"><b>当前选择：</b>
        <img class="tile-inline" src="${tileToSvg(tile)}" alt="${tile.name}" title="${tile.name}">
        （点击添加暗杠）
      </div>
    `;
  }

  function addAnkan() {
    if (!selectedForAnkan) {
      alert('请先选择一张牌作为暗杠');
      return;
    }
    state.ankan.push(selectedForAnkan);
    selectedForAnkan = null;
    updateAnkanDisplay();
  }

  function updateAnkanDisplay() {
    const display = document.getElementById('ankanDisplay');
    const list = state.ankan.length ? renderInlineTiles(state.ankan) : '(无)';
    display.innerHTML = `<div style="width:100%"><b>已选暗杠：</b>${list}</div>`;
  }

  // 宝牌操作
  function addToDora(tile) {
    state.dora.push(tile);
    updateDoraDisplay();
  }

  function updateDoraDisplay() {
    const display = document.getElementById('doraDisplay');
    display.innerHTML = '已选宝牌：' + renderInlineTiles(state.dora);
  }

  function addToUradora(tile) {
    state.uradora.push(tile);
    updateUradoraDisplay();
  }

  function updateUradoraDisplay() {
    const display = document.getElementById('uradoraDisplay');
    display.innerHTML = '已选里宝牌：' + renderInlineTiles(state.uradora);
  }

  // 风选择
  function initWindSelectors() {
    const fieldWind = document.getElementById('fieldWind');
    const seatWind = document.getElementById('seatWind');

    fieldWind.querySelectorAll('.wind-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        fieldWind.querySelectorAll('.wind-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.fieldWind = btn.dataset.wind;
      });
    });

    seatWind.querySelectorAll('.wind-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        seatWind.querySelectorAll('.wind-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.seatWind = btn.dataset.wind;
      });
    });

    // 默认激活“东”（按你映射，东的 id 是 west）
    fieldWind.querySelector('[data-wind="west"]').classList.add('active');
    seatWind.querySelector('[data-wind="west"]').classList.add('active');
  }

  // 核心计算逻辑（示例）
  function calculate() {
    // 这里是核心计算逻辑，需要根据手牌、副露、宝牌等信息：
    // 1. 分析听牌
    // 2. 计算符数
    // 3. 计算番数
    // 4. 计算点数

    const exampleResults = [
      {
        tile: '一萬',
        han: 3,
        fu: 30,
        dealer: { ron: 5800, tsumo: { all: 2000 } },
        nonDealer: { ron: 3900, tsumo: { dealer: 2000, others: 1000 } }
      }
    ];

    displayResults(exampleResults);
  }

  function displayResults(results) {
    const resultSection = document.getElementById('resultSection');
    const resultContent = document.getElementById('resultContent');
    resultContent.innerHTML = '';

    results.forEach(result => {
      const resultItem = document.createElement('div');
      resultItem.className = 'result-item';
      resultItem.innerHTML = `
        <strong>和牌：${result.tile}</strong><br>
        番数：${result.han}番<br>
        符数：${result.fu}符<br>
        <strong>庄家：</strong> ${result.han}番 ${result.fu}符 ${result.dealer.ron}点（荣和） / ${result.dealer.tsumo.all}All（自摸）<br>
        <strong>闲家：</strong> ${result.han}番 ${result.fu}符 ${result.nonDealer.ron}点（荣和） / ${result.nonDealer.tsumo.dealer},${result.nonDealer.tsumo.others}（自摸）
      `;
      resultContent.appendChild(resultItem);
    });

    resultSection.style.display = 'block';
  }

  // 清空操作
  function clearHand() {
    state.hand = [];
    updateHandDisplay();
  }

  function clearMeld() {
    state.melds = [];
    selectedForMeld = [];
    updateMeldArea();
  }

  function clearAnkan() {
    state.ankan = [];
    selectedForAnkan = null;
    updateAnkanDisplay();
  }

  // 初始化
  function init() {
    initTileSelectors();
    initWindSelectors();
    updateHandDisplay();
    updateMeldArea();
    updateAnkanDisplay();
    updateDoraDisplay();
    updateUradoraDisplay();

    // 绑定事件
    document.getElementById('clearHand').addEventListener('click', clearHand);
    document.getElementById('addMeld').addEventListener('click', addMeld);
    document.getElementById('clearMeld').addEventListener('click', clearMeld);
    document.getElementById('addAnkan').addEventListener('click', addAnkan);
    document.getElementById('clearAnkan').addEventListener('click', clearAnkan);
    document.getElementById('calculate').addEventListener('click', calculate);
  }

  window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
