<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>立直麻将听牌与点数计算器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
    body { background-color: #f0f0f0; padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 20px; }
    .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    .section-title { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 2px solid #3498db; }
    
    .tile-selector { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-bottom: 15px; }
    .tile { width: 60px; height: 85px; border: 2px solid transparent; border-radius: 5px; cursor: pointer; background-color: #f9f9f9;
      display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; transition: all 0.2s; user-select: none; position: relative; }
    .tile:hover { background-color: #e8f4fd; border-color: #3498db; }
    .tile.selected { background-color: #3498db; color: white; border-color: #2980b9; }
    .tile.man { color: #e74c3c; }
    .tile.pin { color: #d35400; }
    .tile.sou { color: #27ae60; }
    .tile.honor { color: #8e44ad; }
    .tile.red { color: #e74c3c; font-weight: bold; }
    .tile img { width: 52px; height: 72px; object-fit: contain; pointer-events: none; }
    .tile .tile-label { display: none; font-size: 12px; color: #333; margin-top: 4px; text-align: center; }
    
    .hand-display, .meld-display { min-height: 60px; border: 1px dashed #ccc; padding: 10px; margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; align-items: center; background: #fafafa; }
    .tile-inline { width: 32px; height: 44px; object-fit: contain; vertical-align: middle; margin-right: 4px; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; transition: background-color 0.2s; }
    button:hover { background-color: #27ae60; }
    button.danger { background-color: #e74c3c; }
    button.danger:hover { background-color: #c0392b; }
    
    .result-section { background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 20px; border: 1px solid #e9ecef; }
    .result-item { margin-bottom: 15px; padding: 15px; background-color: white; border-left: 5px solid #3498db; border-radius: 0 4px 4px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .result-item.yakuman { border-left-color: #f1c40f; background-color: #fffcf0; }
    .result-item h4 { margin-bottom: 8px; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; }
    .yakuman-tag { background: #f1c40f; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    
    .point-text { font-size: 16px; font-weight: 500; margin: 4px 0; color: #2c3e50; }
    .point-value { color: #e74c3c; font-weight: bold; font-size: 18px; }
    .yaku-list { color: #666; font-size: 14px; margin-top: 6px; line-height: 1.5; }
    
    .wind-selector { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
    .wind-btn { padding: 8px 15px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; cursor: pointer; user-select: none; }
    .wind-btn.active { background-color: #3498db; color: white; border-color: #2980b9; }
    
    .calc-type { margin: 20px 0; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .calc-type label { font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .muted { color:#888; font-size: 12px; }
    
    .checkbox-group { display: flex; gap: 20px; margin-top: 10px; }
  </style>
</head>

<body>
<div class="container">
  <h1>雀魂规则 - 听牌与点数计算器</h1>

  <!-- 场风与自风选择 -->
  <div class="section">
    <div class="section-title">场况设置</div>
    <div style="display: flex; flex-wrap: wrap; gap: 20px;">
      <div>
        <label>场风：</label>
        <div class="wind-selector" id="fieldWind">
          <!-- 修正：data-wind 对应文件名 east.svg, west.svg 等 -->
          <div class="wind-btn active" data-wind="east">东</div>
          <div class="wind-btn" data-wind="south">南</div>
          <div class="wind-btn" data-wind="west">西</div>
          <div class="wind-btn" data-wind="north">北</div>
        </div>
      </div>
      <div>
        <label>自风：</label>
        <div class="wind-selector" id="seatWind">
          <div class="wind-btn active" data-wind="east">东</div>
          <div class="wind-btn" data-wind="south">南</div>
          <div class="wind-btn" data-wind="west">西</div>
          <div class="wind-btn" data-wind="north">北</div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 10px;">
        <label style="font-size: 16px; font-weight: bold;">
          <input type="checkbox" id="isDealer" style="width: 20px; height: 20px;"> 我是庄家 (亲)
        </label>
      </div>
    </div>
    <div class="muted" style="margin-top:10px;">提示：请保证 index.html 与 svg/ 文件夹同级。</div>
  </div>

  <!-- 和牌类型选择 -->
  <div class="section">
    <div class="section-title">和牌类型</div>
    <div class="calc-type">
      <label><input type="radio" name="winType" value="tsumo" checked> 自摸和</label>
      <label><input type="radio" name="winType" value="ron"> 荣和</label>
      <label><input type="checkbox" id="riichi" checked> 立直（门清限定）</label>
    </div>
  </div>

  <!-- 手牌选择 -->
  <div class="section">
    <div class="section-title">选择手牌（最多 13 张）</div>
    <div class="tile-selector" id="handTiles"></div>
    <div class="hand-display" id="handDisplay">已选手牌：</div>
    <div class="btn-group">
      <button id="clearHand">清空手牌</button>
    </div>
  </div>

  <!-- 副露选择 -->
  <div class="section">
    <div class="section-title">副露（吃/碰/大明杠）</div>
    <div class="tile-selector" id="meldTiles"></div>
    <div class="meld-display" id="meldDisplay">已选副露：</div>
    <div class="btn-group">
      <button id="addMeld">添加副露</button>
      <button id="clearMeld" class="danger">清空副露</button>
    </div>
  </div>

  <!-- 暗杠选择 -->
  <div class="section">
    <div class="section-title">暗杠</div>
    <div class="tile-selector" id="ankanTiles"></div>
    <div class="meld-display" id="ankanDisplay">已选暗杠：</div>
    <div class="btn-group">
      <button id="addAnkan">添加暗杠</button>
      <button id="clearAnkan" class="danger">清空暗杠</button>
    </div>
  </div>

  <!-- 宝牌与里宝牌 -->
  <div class="section">
    <div class="section-title">宝牌与里宝牌指示牌</div>
    <div>
      <label>宝牌指示牌：</label>
      <div class="tile-selector" id="doraTiles"></div>
      <div class="hand-display" id="doraDisplay">已选宝牌：</div>
    </div>
    <div style="margin-top:15px;">
      <label>里宝牌指示牌（立直和牌生效）：</label>
      <div class="tile-selector" id="uradoraTiles"></div>
      <div class="hand-display" id="uradoraDisplay">已选里宝牌：</div>
    </div>
  </div>

  <!-- 计算按钮 -->
  <div style="text-align:center; margin:30px 0;">
    <button id="calculate" style="font-size:20px; padding:15px 30px; background-color: #3498db;">计算听牌与点数</button>
  </div>

  <!-- 结果显示 -->
  <div class="result-section" id="resultSection" style="display:none;">
    <div class="section-title">计算结果（雀魂规则）</div>
    <div id="resultContent"></div>
  </div>
</div>

<script>
  // 牌库定义 - 修正风牌 ID 与文件名对应
  const allTiles = [
    // 万子
    {id: '1m', name: '一萬', type: 'man', suit: 'm', num: 1, isYaochu: true},
    {id: '2m', name: '二萬', type: 'man', suit: 'm', num: 2, isYaochu: false},
    {id: '3m', name: '三萬', type: 'man', suit: 'm', num: 3, isYaochu: false},
    {id: '4m', name: '四萬', type: 'man', suit: 'm', num: 4, isYaochu: false},
    {id: '5m', name: '五萬', type: 'man', suit: 'm', num: 5, isYaochu: false},
    {id: '0m', name: '红五萬', type: 'man', suit: 'm', num: 5, isYaochu: false, red: true},
    {id: '6m', name: '六萬', type: 'man', suit: 'm', num: 6, isYaochu: false},
    {id: '7m', name: '七萬', type: 'man', suit: 'm', num: 7, isYaochu: false},
    {id: '8m', name: '八萬', type: 'man', suit: 'm', num: 8, isYaochu: false},
    {id: '9m', name: '九萬', type: 'man', suit: 'm', num: 9, isYaochu: true},
    // 筒子
    {id: '1p', name: '一筒', type: 'pin', suit: 'p', num: 1, isYaochu: true},
    {id: '2p', name: '二筒', type: 'pin', suit: 'p', num: 2, isYaochu: false},
    {id: '3p', name: '三筒', type: 'pin', suit: 'p', num: 3, isYaochu: false},
    {id: '4p', name: '四筒', type: 'pin', suit: 'p', num: 4, isYaochu: false},
    {id: '5p', name: '五筒', type: 'pin', suit: 'p', num: 5, isYaochu: false},
    {id: '0p', name: '红五筒', type: 'pin', suit: 'p', num: 5, isYaochu: false, red: true},
    {id: '6p', name: '六筒', type: 'pin', suit: 'p', num: 6, isYaochu: false},
    {id: '7p', name: '七筒', type: 'pin', suit: 'p', num: 7, isYaochu: false},
    {id: '8p', name: '八筒', type: 'pin', suit: 'p', num: 8, isYaochu: false},
    {id: '9p', name: '九筒', type: 'pin', suit: 'p', num: 9, isYaochu: true},
    // 索子
    {id: '1s', name: '一索', type: 'sou', suit: 's', num: 1, isYaochu: true},
    {id: '2s', name: '二索', type: 'sou', suit: 's', num: 2, isYaochu: false},
    {id: '3s', name: '三索', type: 'sou', suit: 's', num: 3, isYaochu: false},
    {id: '4s', name: '四索', type: 'sou', suit: 's', num: 4, isYaochu: false},
    {id: '5s', name: '五索', type: 'sou', suit: 's', num: 5, isYaochu: false},
    {id: '0s', name: '红五索', type: 'sou', suit: 's', num: 5, isYaochu: false, red: true},
    {id: '6s', name: '六索', type: 'sou', suit: 's', num: 6, isYaochu: false},
    {id: '7s', name: '七索', type: 'sou', suit: 's', num: 7, isYaochu: false},
    {id: '8s', name: '八索', type: 'sou', suit: 's', num: 8, isYaochu: false},
    {id: '9s', name: '九索', type: 'sou', suit: 's', num: 9, isYaochu: true},
    // 字牌 (修正：east=东，west=西)
    {id: 'east',  name: '東', type: 'honor', honor: 'east',  isKaze: true,  isSangen: false, isYaochu: true},
    {id: 'south', name: '南', type: 'honor', honor: 'south', isKaze: true,  isSangen: false, isYaochu: true},
    {id: 'west',  name: '西', type: 'honor', honor: 'west',  isKaze: true,  isSangen: false, isYaochu: true},
    {id: 'north', name: '北', type: 'honor', honor: 'north', isKaze: true,  isSangen: false, isYaochu: true},
    {id: 'white', name: '白', type: 'honor', honor: 'haku',  isKaze: false, isSangen: true,  isYaochu: true},
    {id: 'rich',  name: '發', type: 'honor', honor: 'hatsu', isKaze: false, isSangen: true,  isYaochu: true},
    {id: 'red',   name: '中', type: 'honor', honor: 'chun',  isKaze: false, isSangen: true,  isYaochu: true}
  ];

  let state = {
    fieldWind: 'east', // 默认场风东
    seatWind: 'east',  // 默认自风东
    isDealer: true,    // 默认庄家
    hand: [],
    melds: [],
    ankan: [],
    dora: [],
    uradora: [],
    winType: 'tsumo',
    isRiichi: true
  };

  function tileToSvg(tile) {
    return `./svg/${encodeURIComponent(tile.id)}.svg`;
  }

  function renderInlineTiles(tiles) {
    return tiles.length
      ? tiles.map(t => `<img class="tile-inline" src="${tileToSvg(t)}" alt="${t.name}" title="${t.name}"
            onerror="this.style.display='none';" />`).join('')
      : '(无)';
  }

  function getTileById(id) {
    return allTiles.find(t => t.id === id) || null;
  }

  function isMenzen() {
    return state.melds.length === 0 && state.ankan.length === 0;
  }

  // 初始化
  function initTileSelectors() {
    const containers = ['handTiles', 'meldTiles', 'ankanTiles', 'doraTiles', 'uradoraTiles'];
    const handlers = [addToHand, selectForMeld, selectForAnkan, addToDora, addToUradora];

    containers.forEach((id, index) => {
      const container = document.getElementById(id);
      container.innerHTML = '';
      allTiles.forEach(tile => {
        const tileEl = document.createElement('div');
        tileEl.className = `tile ${tile.type} ${tile.red ? 'red' : ''}`;
        tileEl.dataset.tileId = tile.id;
        tileEl.title = tile.name;
        tileEl.innerHTML = `
          <img src="${tileToSvg(tile)}" alt="${tile.name}"
               onerror="this.style.display='none'; this.parentElement.querySelector('.tile-label').style.display='block';" />
          <span class="tile-label">${tile.name}</span>
        `;
        tileEl.addEventListener('click', () => handlers[index](tile));
        container.appendChild(tileEl);
      });
    });
  }

  // 手牌操作
  function addToHand(tile) {
    if (state.hand.length >= 13) { alert('手牌最多 13 张！'); return; }
    state.hand.push(tile);
    updateHandDisplay();
  }
  function updateHandDisplay() {
    document.getElementById('handDisplay').innerHTML = '已选手牌：' + renderInlineTiles(state.hand);
  }

  // 副露操作
  let selectedForMeld = [];
  function selectForMeld(tile) {
    if (selectedForMeld.length >= 3) { alert('副露每组最多 3 张！'); return; }
    selectedForMeld.push(tile);
    updateMeldArea();
  }
  function addMeld() {
    if (selectedForMeld.length !== 3) { alert('请选择 3 张牌组成副露！'); return; }
    state.melds.push([...selectedForMeld]);
    selectedForMeld = [];
    updateMeldArea();
    if (state.isRiichi) {
      state.isRiichi = false;
      document.getElementById('riichi').checked = false;
      alert('立直为门清限定！已自动取消立直');
    }
  }
  function updateMeldArea() {
    const display = document.getElementById('meldDisplay');
    const meldsHtml = state.melds.map(m => `[${renderInlineTiles(m)}]`).join(' ') || '(无)';
    const curHtml = renderInlineTiles(selectedForMeld) || '(无)';
    display.innerHTML = `<div><b>已选副露：</b>${meldsHtml}</div><div style="margin-top:6px;"><b>当前选择：</b>${curHtml}</div>`;
  }

  // 暗杠操作
  let selectedForAnkan = null;
  function selectForAnkan(tile) {
    selectedForAnkan = tile;
    const display = document.getElementById('ankanDisplay');
    display.innerHTML = `<div><b>已选暗杠：</b>${renderInlineTiles(state.ankan) || '(无)'}</div><div style="margin-top:6px;"><b>当前选择：</b>${renderInlineTiles([tile])}（点击添加）</div>`;
  }
  function addAnkan() {
    if (!selectedForAnkan) { alert('请先选择一张牌！'); return; }
    state.ankan.push(selectedForAnkan);
    selectedForAnkan = null;
    updateAnkanDisplay();
  }
  function updateAnkanDisplay() {
    document.getElementById('ankanDisplay').innerHTML = `<b>已选暗杠：</b>${renderInlineTiles(state.ankan) || '(无)'}`;
  }

  // 宝牌
  function addToDora(tile) { state.dora.push(tile); updateDoraDisplay(); }
  function updateDoraDisplay() { document.getElementById('doraDisplay').innerHTML = '已选宝牌：' + renderInlineTiles(state.dora); }
  function addToUradora(tile) { state.uradora.push(tile); updateUradoraDisplay(); }
  function updateUradoraDisplay() { document.getElementById('uradoraDisplay').innerHTML = '已选里宝牌：' + renderInlineTiles(state.uradora); }

  // 风选择
  function initWindSelectors() {
    const setWindActive = (container, wind) => {
      container.querySelectorAll('.wind-btn').forEach(b => b.classList.toggle('active', b.dataset.wind === wind));
    };
    document.getElementById('fieldWind').addEventListener('click', (e) => {
      if (e.target.classList.contains('wind-btn')) { state.fieldWind = e.target.dataset.wind; setWindActive(e.target.parentElement, state.fieldWind); }
    });
    document.getElementById('seatWind').addEventListener('click', (e) => {
      if (e.target.classList.contains('wind-btn')) { state.seatWind = e.target.dataset.wind; setWindActive(e.target.parentElement, state.seatWind); }
    });
    // 初始化默认选中
    setWindActive(document.getElementById('fieldWind'), 'east');
    setWindActive(document.getElementById('seatWind'), 'east');
    
    document.getElementById('isDealer').addEventListener('change', (e) => state.isDealer = e.target.checked);
    
    document.querySelectorAll('input[name="winType"]').forEach(radio => {
      radio.addEventListener('change', (e) => state.winType = e.target.value);
    });
    document.getElementById('riichi').addEventListener('change', (e) => {
      state.isRiichi = e.target.checked;
      if (state.isRiichi && !isMenzen()) {
        alert('立直为门清限定！');
        e.target.checked = false;
        state.isRiichi = false;
      }
    });
  }

  // ====== 核心逻辑：听牌分析 ======
  function analyzeTenpai() {
    const allPossibleTiles = allTiles.filter(t => !t.red);
    const tenpaiTiles = [];
    for (const tile of allPossibleTiles) {
      const testHand = [...state.hand, tile];
      if (isValidMahjongHand(testHand) || isSevenPairs(testHand) || isKokushiMusou(testHand)) {
        tenpaiTiles.push(tile);
      }
    }
    return tenpaiTiles.length ? tenpaiTiles : [{name: '无听牌', id: 'none'}];
  }

  function isValidMahjongHand(tiles) {
    if (tiles.length !== 14) return false;
    const sorted = [...tiles].sort((a, b) => {
      if (a.suit !== b.suit) return (a.suit || '').localeCompare(b.suit || '');
      return (a.num || 0) - (b.num || 0);
    });
    for (let i = 0; i < sorted.length - 1; i++) {
      if (sorted[i].id === sorted[i+1].id) {
        const rest = [...sorted.slice(0, i), ...sorted.slice(i+2)];
        if (checkMentsu(rest)) return true;
      }
    }
    return false;
  }

  function checkMentsu(tiles) {
    if (tiles.length === 0) return true;
    const first = tiles[0];
    const same = tiles.filter(t => t.id === first.id);
    if (same.length >= 3) {
      const rest = removeTiles(tiles, [first.id, first.id, first.id]);
      if (checkMentsu(rest)) return true;
    }
    if (first.type !== 'honor') {
      const id2 = `${first.num+1}${first.suit}`;
      const id3 = `${first.num+2}${first.suit}`;
      if (tiles.some(t => t.id === id2) && tiles.some(t => t.id === id3)) {
        const rest = removeTiles(tiles, [first.id, id2, id3]);
        if (checkMentsu(rest)) return true;
      }
    }
    return false;
  }

  function removeTiles(tiles, ids) {
    const arr = [...tiles];
    ids.forEach(id => {
      const idx = arr.findIndex(t => t.id === id);
      if (idx >= 0) arr.splice(idx, 1);
    });
    return arr;
  }

  function isSevenPairs(tiles) {
    if (tiles.length !== 14) return false;
    const count = {};
    tiles.forEach(t => count[t.id] = (count[t.id] || 0) + 1);
    return Object.values(count).filter(c => c === 2).length === 7;
  }

  function isKokushiMusou(tiles) {
    if (tiles.length !== 14) return false;
    const yaochuuIds = allTiles.filter(t => t.isYaochu).map(t => t.id);
    const unique = new Set(tiles.map(t => t.id));
    if (unique.size !== 13) return false;
    return yaochuuIds.every(id => unique.has(id));
  }

  // ====== 核心逻辑：役种判断 ======
  function calculateYaku(hand, winTile) {
    const fullHand = [...hand, winTile];
    const yakuList = [];
    let isYakuman = false;
    let yakumanCount = 0;

    const menzen = isMenzen();

    // 1. 九莲宝灯
    const suits = ['m', 'p', 's'];
    for (let suit of suits) {
      const suitTiles = fullHand.filter(t => t.suit === suit);
      if (suitTiles.length === 14) {
        const counts = {};
        suitTiles.forEach(t => counts[t.num] = (counts[t.num] || 0) + 1);
        let isChuren = true;
        if (counts[1] !== 3 || counts[9] !== 3) isChuren = false;
        for (let i = 2; i <= 8; i++) {
          if (counts[i] !== 1) isChuren = false;
        }
        if (isChuren && menzen) {
          yakuList.push({ name: '九莲宝灯', han: 13, isYakuman: true });
          isYakuman = true;
          yakumanCount += 1;
          break; 
        }
      }
    }

    // 2. 四暗刻
    if (menzen) {
      const counts = {};
      fullHand.forEach(t => counts[t.id] = (counts[t.id] || 0) + 1);
      const ankoCount = Object.values(counts).filter(c => c >= 3).length;
      if (ankoCount === 4) {
         const pairCount = Object.values(counts).filter(c => c === 2).length;
         if (pairCount === 1 || (pairCount === 0 && Object.values(counts).some(c => c === 4))) {
           yakuList.push({ name: '四暗刻', han: 13, isYakuman: true });
           isYakuman = true;
           yakumanCount += 1;
         }
      }
    }

    // 3. 大三元
    const sangenCounts = { 'white': 0, 'rich': 0, 'red': 0 };
    fullHand.forEach(t => {
      if (t.honor === 'haku') sangenCounts.white++;
      if (t.honor === 'hatsu') sangenCounts.rich++;
      if (t.honor === 'chun') sangenCounts.red++;
    });
    if (sangenCounts.white >= 3 && sangenCounts.rich >= 3 && sangenCounts.red >= 3) {
      yakuList.push({ name: '大三元', han: 13, isYakuman: true });
      isYakuman = true;
      yakumanCount += 1;
    }

    // 4. 国士无双
    if (isKokushiMusou(fullHand)) {
      const uniqueIds = new Set(fullHand.map(t => t.id));
      if (uniqueIds.size === 14) {
         yakuList.push({ name: '国士无双十三面', han: 26, isYakuman: true });
         isYakuman = true;
         yakumanCount += 2;
      } else {
         yakuList.push({ name: '国士无双', han: 13, isYakuman: true });
         isYakuman = true;
         yakumanCount += 1;
      }
    }

    // 普通役
    if (!isYakuman) {
      if (state.isRiichi && menzen) { yakuList.push({ name: '立直', han: 1 }); }
      if (state.winType === 'tsumo' && menzen) { yakuList.push({ name: '门清自摸和', han: 1 }); }
      if (!fullHand.some(t => t.isYaochu)) { yakuList.push({ name: '断幺九', han: 1 }); }
      
      // 役牌判断 (场风/自风/三元)
      const honorCounts = {};
      fullHand.forEach(t => { if(t.type === 'honor') honorCounts[t.honor] = (honorCounts[t.honor] || 0) + 1; });
      
      // 场风
      if (honorCounts[state.fieldWind] >= 3) yakuList.push({ name: `场风 (${getTileById(state.fieldWind).name})`, han: 1 });
      // 自风
      if (honorCounts[state.seatWind] >= 3) yakuList.push({ name: `自风 (${getTileById(state.seatWind).name})`, han: 1 });
      // 三元
      if (honorCounts['haku'] >= 3) yakuList.push({ name: '役牌 (白)', han: 1 });
      if (honorCounts['hatsu'] >= 3) yakuList.push({ name: '役牌 (发)', han: 1 });
      if (honorCounts['chun'] >= 3) yakuList.push({ name: '役牌 (中)', han: 1 });
    }

    return { yakuList, isYakuman, yakumanCount };
  }

  function calculateDoraCount(hand) {
    let count = 0;
    const indicators = [...state.dora, ...(state.isRiichi ? state.uradora : [])];
    
    // 修正：风牌宝牌顺序 东->南->西->北->东
    const doraTiles = indicators.map(ind => {
      if (ind.type === 'honor') {
        // 修正后的顺序：east, south, west, north, white, rich, red
        const order = ['east','south','west','north','white','rich','red'];
        const idx = order.findIndex(id => id === ind.id);
        return getTileById(order[(idx + 1) % 7]);
      } else {
        const num = ind.num === 9 ? 1 : ind.num + 1;
        return allTiles.find(t => t.suit === ind.suit && t.num === num && !t.red);
      }
    }).filter(Boolean);

    hand.forEach(t => {
      if (t.red) count++;
      if (doraTiles.some(d => d.id === t.id)) count++;
    });
    return count;
  }

  // ====== 点数计算 ======
  function calculatePoints(yakuResult, doraCount) {
    const isDealer = state.isDealer;
    const isTsumo = state.winType === 'tsumo';
    
    if (yakuResult.isYakuman) {
      const count = yakuResult.yakumanCount;
      let base = 32000; 
      if (isDealer) base = 48000;
      
      const total = base * count;
      
      if (isTsumo) {
        if (isDealer) {
          return { desc: `自摸：${16000 * count} 点 (全员)`, total: total, isYakuman: true };
        } else {
          return { desc: `自摸：${8000 * count}/${16000 * count} 点`, total: total, isYakuman: true };
        }
      } else {
        return { desc: `荣和：${total} 点`, total: total, isYakuman: true };
      }
    } else {
      // 普通牌型
      const han = yakuResult.yakuList.reduce((sum, y) => sum + y.han, 0) + doraCount;
      
      let fu = 20;
      if (isTsumo) fu += 2;
      if (!isMenzen() && state.winType === 'ron') fu += 2;
      fu = Math.ceil(fu / 10) * 10;
      if (fu < 20) fu = 20;
      if (fu === 25 && yakuResult.yakuList.some(y => y.name === '七对子')) fu = 25;

      let desc = "";
      let finalPoint = 0;

      if (state.winType === 'ron') {
        const basic = fu * Math.pow(2, han + 2);
        let ronPoint = Math.ceil(basic * 4 / 100) * 100;
        
        if (han >= 5 && han < 6) finalPoint = 12000; 
        else if (han >= 6 && han < 8) finalPoint = 18000; 
        else if (han >= 8 && han < 11) finalPoint = 24000; 
        else if (han >= 11 && han < 13) finalPoint = 36000; 
        else if (han >= 13) finalPoint = isDealer ? 48000 : 32000; 
        else finalPoint = ronPoint;
        
        desc = `荣和：${finalPoint} 点`;
        return { desc, total: finalPoint, han, fu };
      } else {
        const basic = fu * Math.pow(2, han + 2);
        let tsumoDealer = Math.ceil(basic * 2 / 100) * 100;
        let tsumoNonDealer = Math.ceil(basic / 100) * 100;
        
        if (han >= 5) {
           if (isDealer) { desc = `自摸：16000 点 (全员)`; return {desc, total: 48000, han, fu}; }
           else { desc = `自摸：4000/8000 点`; return {desc, total: 16000, han, fu}; }
        }
        
        if (isDealer) desc = `自摸：${tsumoDealer} 点 (全员)`;
        else desc = `自摸：${tsumoNonDealer}/${tsumoDealer} 点`;
        
        return { desc, total: isDealer ? tsumoDealer*3 : (tsumoNonDealer + tsumoDealer*2), han, fu };
      }
    }
  }

  // ====== 主计算入口 ======
  function calculate() {
    if (state.hand.length !== 13) { alert('请选择 13 张手牌'); return; }

    const waits = analyzeTenpai();
    const resultSection = document.getElementById('resultSection');
    const resultContent = document.getElementById('resultContent');
    resultSection.style.display = 'block';
    resultContent.innerHTML = '';

    if (waits.length === 1 && waits[0].id === 'none') {
      resultContent.innerHTML = `<div class="result-item"><h4>听牌结果</h4><div class="point-text">当前无听牌</div></div>`;
      return;
    }

    waits.forEach(tile => {
      const yakuRes = calculateYaku(state.hand, tile);
      const doraCount = calculateDoraCount([...state.hand, tile]);
      
      if (yakuRes.yakuList.some(y => y.name === '九莲宝灯')) {
        if (waits.length === 9) {
          yakuRes.yakuList = yakuRes.yakuList.filter(y => y.name !== '九莲宝灯');
          yakuRes.yakuList.push({ name: '纯正九莲宝灯', han: 26, isYakuman: true });
          yakuRes.isYakuman = true;
          yakuRes.yakumanCount = 2;
        }
      }

      const pointsRes = calculatePoints(yakuRes, doraCount);
      
      const yakuText = [
        ...yakuRes.yakuList.map(x => `${x.name}${x.isYakuman ? '' : `(${x.han}翻)`}`),
        (doraCount > 0 ? `宝牌/里宝牌/赤宝牌 (${doraCount}翻)` : '')
      ].filter(Boolean).join('，');

      const isYakumanClass = pointsRes.isYakuman ? 'yakuman' : '';
      const fuText = pointsRes.isYakuman ? '' : `；${pointsRes.fu} 符`;
      const hanText = pointsRes.isYakuman ? '役满' : `${pointsRes.han} 翻`;

      resultContent.innerHTML += `
        <div class="result-item ${isYakumanClass}">
          <h4>
            和牌张：${tile.name} 
            ${pointsRes.isYakuman ? '<span class="yakuman-tag">役满</span>' : ''}
          </h4>
          <div class="point-text">听牌：${renderInlineTiles([tile])}</div>
          <div class="point-text">
            番数：<span class="point-value">${hanText}</span>${fuText}
          </div>
          <div class="point-text" style="font-size: 20px; color: #c0392b; margin-top: 10px;">
            ${pointsRes.desc}
          </div>
          <div class="yaku-list">役种：${yakuText || '（无/未判定）'}</div>
        </div>
      `;
    });
  }

  function bindButtons() {
    document.getElementById('clearHand').addEventListener('click', () => { state.hand = []; updateHandDisplay(); });
    document.getElementById('addMeld').addEventListener('click', addMeld);
    document.getElementById('clearMeld').addEventListener('click', () => { state.melds = []; selectedForMeld = []; updateMeldArea(); });
    document.getElementById('addAnkan').addEventListener('click', addAnkan);
    document.getElementById('clearAnkan').addEventListener('click', () => { state.ankan = []; selectedForAnkan = null; updateAnkanDisplay(); });
    document.getElementById('calculate').addEventListener('click', calculate);
  }

  function init() {
    initTileSelectors();
    initWindSelectors();
    bindButtons();
    updateHandDisplay();
    updateMeldArea();
    updateAnkanDisplay();
    updateDoraDisplay();
    updateUradoraDisplay();
  }

  init();
</script>
