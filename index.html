<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>雀魂规则 - 立直麻将听牌与点数计算器 (最终修正版)</title>
    <link rel="icon" href="data:,">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
        body{background-color:#f0f0f0;padding:20px}
        .container{max-width:1200px;margin:0 auto;background-color:white;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
        h1{text-align:center;color:#333;margin-bottom:20px}
        .section{margin-bottom:30px;padding:15px;border:1px solid #ddd;border-radius:8px}
        .section-title{font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:15px;padding-bottom:8px;border-bottom:2px solid #3498db}
        .tile-selector{display:grid;grid-template-columns:repeat(auto-fill, minmax(60px, 1fr));gap:8px;margin-bottom:15px}
        .tile{width:60px;height:85px;border:2px solid transparent;border-radius:5px;cursor:pointer;background-color:#f9f9f9;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:14px;font-weight:bold;transition:all 0.2s;user-select:none;position:relative}
        .tile:hover{background-color:#e8f4fd;border-color:#3498db}
        .tile.selected{background-color:#3498db;color:white;border-color:#2980b9}
        .tile.man{color:#e74c3c}
        .tile.pin{color:#d35400}
        .tile.sou{color:#27ae60}
        .tile.honor{color:#8e44ad}
        .tile.red{color:#e74c3c;font-weight:bold;border-color:#e74c3c;background-color:#fff5f5}
        .tile img{width:52px;height:72px;object-fit:contain;pointer-events:none}
        .tile .tile-label{display:none;font-size:12px;color:#333;margin-top:4px;text-align:center}
        
        /* 修改：已选牌区域的样式 */
        .hand-display,.meld-display{min-height:60px;border:1px dashed #ccc;padding:10px;margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:#fafafa}
        
        /* 修改：可删除的牌样式 */
        .tile-inline{width:32px;height:44px;object-fit:contain;vertical-align:middle;margin-right:4px;cursor:pointer;transition:all 0.2s;border-radius:4px;position:relative}
        .tile-inline:hover{transform:scale(1.1);border:2px solid #e74c3c;background-color:#fff0f0;z-index:10}
        .tile-inline::after{content:'×';position:absolute;top:-5px;right:-5px;background:#e74c3c;color:white;border-radius:50%;width:16px;height:16px;font-size:12px;line-height:14px;text-align:center;display:none}
        .tile-inline:hover::after{display:block}

        .btn-group{display:flex;gap:10px;margin-top:15px;flex-wrap:wrap}
        button{padding:10px 20px;background-color:#2ecc71;color:white;border:none;border-radius:5px;cursor:pointer;font-size:16px;transition:background-color 0.2s}
        button:hover{background-color:#27ae60}
        button.danger{background-color:#e74c3c}
        button.danger:hover{background-color:#c0392b}
        .result-section{background-color:#f8f9fa;padding:20px;border-radius:8px;margin-top:20px;border:1px solid #e9ecef}
        .result-item{margin-bottom:15px;padding:15px;background-color:white;border-left:5px solid #3498db;border-radius:0 4px 4px 0;box-shadow:0 2px 5px rgba(0,0,0,0.05)}
        .result-item.yakuman{border-left-color:#f1c40f;background-color:#fffcf0}
        .result-item h4{margin-bottom:8px;color:#2c3e50;display:flex;justify-content:space-between;align-items:center}
        .yakuman-tag{background:#f1c40f;color:#fff;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:bold}
        .point-text{font-size:16px;font-weight:500;margin:4px 0;color:#2c3e50}
        .point-value{color:#e74c3c;font-weight:bold;font-size:18px}
        .yaku-list{color:#666;font-size:14px;margin-top:6px;line-height:1.5}
        .wind-selector{display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap}
        .wind-btn{padding:8px 15px;background-color:#ecf0f1;border:1px solid #bdc3c7;border-radius:5px;cursor:pointer;user-select:none}
        .wind-btn.active{background-color:#3498db;color:white;border-color:#2980b9}
        .calc-type{margin:20px 0;display:flex;gap:15px;flex-wrap:wrap;align-items:center}
        .calc-type label{font-size:16px;cursor:pointer;display:flex;align-items:center;gap:5px}
        .config-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:15px}
        .config-grid label{display:flex;flex-direction:column;gap:6px;font-size:14px;color:#2c3e50}
        .config-grid input{padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:14px}
        .muted{color:#888;font-size:12px}
        .dealer-indicator{display:inline-block;padding:4px 12px;border-radius:4px;font-size:12px;font-weight:bold;margin-left:10px}
        .dealer-indicator.dealer{background-color:#f1c40f;color:#fff}
        .dealer-indicator.non-dealer{background-color:#95a5a6;color:#fff}
        .remain-count{display:inline-block;padding:2px 6px;background:#e74c3c;color:#fff;border-radius:3px;font-size:11px;margin-left:5px}
    </style>
</head>
<body>
<div class="container">
    <h1>雀魂规则 - 听牌与点数计算器</h1>
    
    <div class="section">
        <div class="section-title">场况设置</div>
        <div style="display: flex; flex-wrap: wrap; gap: 20px;">
            <div>
                <label>场风：</label>
                <div class="wind-selector" id="fieldWind">
                    <div class="wind-btn active" data-wind="east">东</div>
                    <div class="wind-btn" data-wind="south">南</div>
                    <div class="wind-btn" data-wind="west">西</div>
                    <div class="wind-btn" data-wind="north">北</div>
                </div>
            </div>
            <div>
                <label>自风：</label>
                <div class="wind-selector" id="seatWind">
                    <div class="wind-btn active" data-wind="east">东</div>
                    <div class="wind-btn" data-wind="south">南</div>
                    <div class="wind-btn" data-wind="west">西</div>
                    <div class="wind-btn" data-wind="north">北</div>
                </div>
                <div id="dealerIndicator" class="dealer-indicator dealer">庄家 (亲)</div>
            </div>
        </div>
        <div class="muted" style="margin-top:10px;">提示：自风为东时自动判定为庄家</div>
    </div>

    <div class="section">
        <div class="section-title">和牌类型</div>
        <div class="calc-type">
            <label><input type="radio" name="winType" value="tsumo" checked> 自摸和</label>
            <label><input type="radio" name="winType" value="ron"> 荣和</label>
            <label><input type="checkbox" id="riichi" checked> 立直（门清限定）</label>
            <label><input type="checkbox" id="doubleRiichi"> 双立直（门清限定）</label>
            <label><input type="checkbox" id="ippatsu"> 一发</label>
            <label><input type="checkbox" id="haitei"> 海底/河底</label>
            <label><input type="checkbox" id="houtei"> 岭上开花</label>
            <label><input type="checkbox" id="chankan"> 抢杠</label>
            <label><input type="checkbox" id="tenhou"> 天和（亲家自摸）</label>
            <label><input type="checkbox" id="chiihou"> 地和（子家自摸）</label>
        </div>
        <div class="config-grid">
            <label>本场数
                <input type="number" id="honbaCount" min="0" value="0"/>
            </label>
            <label>供托数（立直棒）
                <input type="number" id="kyotakuCount" min="0" value="0"/>
            </label>
        </div>
        <div class="muted" style="margin-top:10px;">说明：本场会影响支付点数，供托会加到和牌者总收入；宝牌不能单独构成和牌役。</div>
    </div>

    <div class="section">
        <div class="section-title">选择手牌</div>
        <div class="tile-selector" id="handTiles"></div>
        <div class="hand-display" id="handDisplay">已选手牌：</div>
        <div class="btn-group"><button id="clearHand">清空手牌</button></div>
    </div>

    <div class="section">
        <div class="section-title">副露（吃/碰/大明杠）</div>
        <div class="tile-selector" id="meldTiles"></div>
        <div class="meld-display" id="meldDisplay">已选副露：</div>
        <div class="btn-group">
            <button id="addMeld">添加副露 (3 或 4 张)</button>
            <button id="clearMeld" class="danger">清空副露</button>
        </div>
        <div class="muted" style="margin-top:8px;">提示：吃/碰选 3 张，大明杠选 4 张</div>
    </div>

    <div class="section">
        <div class="section-title">暗杠</div>
        <div class="tile-selector" id="ankanTiles"></div>
        <div class="meld-display" id="ankanDisplay">已选暗杠：</div>
        <div class="btn-group">
            <button id="addAnkan">添加暗杠</button>
            <button id="clearAnkan" class="danger">清空暗杠</button>
        </div>
    </div>

    <div class="section">
        <div class="section-title">宝牌与里宝牌指示牌</div>
        <div>
            <label>宝牌指示牌：</label>
            <div class="tile-selector" id="doraTiles"></div>
            <div class="hand-display" id="doraDisplay">已选宝牌：</div>
            <div class="btn-group"><button id="clearDora" class="danger" style="padding:5px 10px;font-size:14px;">清空宝牌</button></div>
        </div>
        <div style="margin-top:15px;">
            <label>里宝牌指示牌（立直和牌生效）：</label>
            <div class="tile-selector" id="uradoraTiles"></div>
            <div class="hand-display" id="uradoraDisplay">已选里宝牌：</div>
            <div class="btn-group"><button id="clearUradora" class="danger" style="padding:5px 10px;font-size:14px;">清空里宝牌</button></div>
        </div>
    </div>

    <div style="text-align:center; margin:30px 0;">
        <button id="calculate" style="font-size:20px; padding:15px 30px; background-color: #3498db;">计算听牌与点数</button>
    </div>

    <div class="result-section" id="resultSection" style="display:none;">
        <div class="section-title">计算结果（雀魂规则）</div>
        <div id="resultContent"></div>
    </div>
</div>

<script>
const allTiles = [
    {id:'1m',name:'一萬',type:'man',suit:'m',num:1,isYaochu:true}, {id:'2m',name:'二萬',type:'man',suit:'m',num:2,isYaochu:false}, {id:'3m',name:'三萬',type:'man',suit:'m',num:3,isYaochu:false}, {id:'4m',name:'四萬',type:'man',suit:'m',num:4,isYaochu:false}, {id:'5m',name:'五萬',type:'man',suit:'m',num:5,isYaochu:false}, {id:'0m',name:'红五萬',type:'man',suit:'m',num:5,isYaochu:false,red:true}, {id:'6m',name:'六萬',type:'man',suit:'m',num:6,isYaochu:false}, {id:'7m',name:'七萬',type:'man',suit:'m',num:7,isYaochu:false}, {id:'8m',name:'八萬',type:'man',suit:'m',num:8,isYaochu:false}, {id:'9m',name:'九萬',type:'man',suit:'m',num:9,isYaochu:true},
    {id:'1p',name:'一筒',type:'pin',suit:'p',num:1,isYaochu:true}, {id:'2p',name:'二筒',type:'pin',suit:'p',num:2,isYaochu:false}, {id:'3p',name:'三筒',type:'pin',suit:'p',num:3,isYaochu:false}, {id:'4p',name:'四筒',type:'pin',suit:'p',num:4,isYaochu:false}, {id:'5p',name:'五筒',type:'pin',suit:'p',num:5,isYaochu:false}, {id:'0p',name:'红五筒',type:'pin',suit:'p',num:5,isYaochu:false,red:true}, {id:'6p',name:'六筒',type:'pin',suit:'p',num:6,isYaochu:false}, {id:'7p',name:'七筒',type:'pin',suit:'p',num:7,isYaochu:false}, {id:'8p',name:'八筒',type:'pin',suit:'p',num:8,isYaochu:false}, {id:'9p',name:'九筒',type:'pin',suit:'p',num:9,isYaochu:true},
    {id:'1s',name:'一索',type:'sou',suit:'s',num:1,isYaochu:true}, {id:'2s',name:'二索',type:'sou',suit:'s',num:2,isYaochu:false}, {id:'3s',name:'三索',type:'sou',suit:'s',num:3,isYaochu:false}, {id:'4s',name:'四索',type:'sou',suit:'s',num:4,isYaochu:false}, {id:'5s',name:'五索',type:'sou',suit:'s',num:5,isYaochu:false}, {id:'0s',name:'红五索',type:'sou',suit:'s',num:5,isYaochu:false,red:true}, {id:'6s',name:'六索',type:'sou',suit:'s',num:6,isYaochu:false}, {id:'7s',name:'七索',type:'sou',suit:'s',num:7,isYaochu:false}, {id:'8s',name:'八索',type:'sou',suit:'s',num:8,isYaochu:false}, {id:'9s',name:'九索',type:'sou',suit:'s',num:9,isYaochu:true},
    {id:'east',name:'東',type:'honor',honor:'east',isKaze:true,isSangen:false,isYaochu:true}, {id:'south',name:'南',type:'honor',honor:'south',isKaze:true,isSangen:false,isYaochu:true}, {id:'west',name:'西',type:'honor',honor:'west',isKaze:true,isSangen:false,isYaochu:true}, {id:'north',name:'北',type:'honor',honor:'north',isKaze:true,isSangen:false,isYaochu:true},
    {id:'white',name:'白',type:'honor',honor:'haku',isKaze:false,isSangen:true,isYaochu:true}, {id:'rich',name:'發',type:'honor',honor:'hatsu',isKaze:false,isSangen:true,isYaochu:true}, {id:'red',name:'中',type:'honor',honor:'chun',isKaze:false,isSangen:true,isYaochu:true}
];

const PERSISTED_STATE_KEY='riichi-mahjong-state-v1';
const windValues=['east','south','west','north'];
const winTypeValues=['tsumo','ron'];
const defaultState={ fieldWind:'east', seatWind:'east', hand:[], melds:[], ankan:[], dora:[], uradora:[], winType:'tsumo', isRiichi:true, isDoubleRiichi:false, ippatsu:false, haitei:false, houtei:false, chankan:false, tenhou:false, chiihou:false, honbaCount:0, kyotakuCount:0 };
let isRestoringState=false;

function createDefaultState(){return { ...defaultState, hand:[], melds:[], ankan:[], dora:[], uradora:[] };}
let state = createDefaultState();

function getStorage(){
    try{return typeof localStorage==='undefined'?null:localStorage;}
    catch(error){return null;}
}
function getSafeBoolean(value,fallback=false){return typeof value==='boolean'?value:fallback;}
function getSafeNumber(value,fallback=0){
    const parsed=parseInt(value,10);
    return Number.isFinite(parsed)&&parsed>=0?parsed:fallback;
}
function tileIdsToTiles(tileIds){
    if(!Array.isArray(tileIds))return [];
    return tileIds.map(getTileById).filter(Boolean);
}
function serializeState(){
    return {
        fieldWind:state.fieldWind,
        seatWind:state.seatWind,
        hand:state.hand.map(tile=>tile.id),
        melds:state.melds.map(group=>group.map(tile=>tile.id)),
        ankan:state.ankan.map(tile=>tile.id),
        dora:state.dora.map(tile=>tile.id),
        uradora:state.uradora.map(tile=>tile.id),
        winType:state.winType,
        isRiichi:state.isRiichi,
        isDoubleRiichi:state.isDoubleRiichi,
        ippatsu:state.ippatsu,
        haitei:state.haitei,
        houtei:state.houtei,
        chankan:state.chankan,
        tenhou:state.tenhou,
        chiihou:state.chiihou,
        honbaCount:state.honbaCount,
        kyotakuCount:state.kyotakuCount,
    };
}
function hydrateState(savedState){
    const nextState=createDefaultState();
    if(savedState&&typeof savedState==='object'){
        if(windValues.includes(savedState.fieldWind))nextState.fieldWind=savedState.fieldWind;
        if(windValues.includes(savedState.seatWind))nextState.seatWind=savedState.seatWind;
        if(winTypeValues.includes(savedState.winType))nextState.winType=savedState.winType;
        nextState.hand=tileIdsToTiles(savedState.hand);
        nextState.melds=Array.isArray(savedState.melds)?savedState.melds.map(group=>tileIdsToTiles(group)).filter(group=>group.length>0):[];
        nextState.ankan=tileIdsToTiles(savedState.ankan);
        nextState.dora=tileIdsToTiles(savedState.dora);
        nextState.uradora=tileIdsToTiles(savedState.uradora);
        nextState.isRiichi=getSafeBoolean(savedState.isRiichi,defaultState.isRiichi);
        nextState.isDoubleRiichi=getSafeBoolean(savedState.isDoubleRiichi,defaultState.isDoubleRiichi);
        nextState.ippatsu=getSafeBoolean(savedState.ippatsu,defaultState.ippatsu);
        nextState.haitei=getSafeBoolean(savedState.haitei,defaultState.haitei);
        nextState.houtei=getSafeBoolean(savedState.houtei,defaultState.houtei);
        nextState.chankan=getSafeBoolean(savedState.chankan,defaultState.chankan);
        nextState.tenhou=getSafeBoolean(savedState.tenhou,defaultState.tenhou);
        nextState.chiihou=getSafeBoolean(savedState.chiihou,defaultState.chiihou);
        nextState.honbaCount=getSafeNumber(savedState.honbaCount,defaultState.honbaCount);
        nextState.kyotakuCount=getSafeNumber(savedState.kyotakuCount,defaultState.kyotakuCount);
    }
    state=nextState;
}
function savePersistedState(){
    if(isRestoringState)return;
    const storage=getStorage();
    if(!storage)return;
    try{storage.setItem(PERSISTED_STATE_KEY,JSON.stringify(serializeState()));}
    catch(error){console.warn('????????',error);}
}
function loadPersistedState(){
    const storage=getStorage();
    if(!storage)return false;
    const raw=storage.getItem(PERSISTED_STATE_KEY);
    if(!raw)return false;
    try{
        isRestoringState=true;
        hydrateState(JSON.parse(raw));
        return true;
    }catch(error){
        console.warn('?????????????????',error);
        storage.removeItem(PERSISTED_STATE_KEY);
        hydrateState(null);
        return false;
    }finally{
        isRestoringState=false;
    }
}

function isDealer(){return state.seatWind==='east';}
function tileToSvg(tile){return `./svg/${encodeURIComponent(tile.id)}.svg`;}
function normalizeTileId(tileOrId){
    if(!tileOrId)return tileOrId;
    if(typeof tileOrId==='string'){
        if(tileOrId.length===2&&tileOrId[0]==='0'&&['m','p','s'].includes(tileOrId[1]))return `5${tileOrId[1]}`;
        return tileOrId;
    }
    if(tileOrId.red&&tileOrId.num===5)return `5${tileOrId.suit}`;
    return tileOrId.id;
}
function normalizeTile(tile){return getTileById(normalizeTileId(tile));}
function normalizeTiles(tiles){return tiles.map(normalizeTile);}
function countTilesById(tiles){const counts={};normalizeTiles(tiles).forEach(t=>counts[t.id]=(counts[t.id]||0)+1);return counts;}
function countsEqual(a,b){
    const keys=new Set([...Object.keys(a),...Object.keys(b)]);
    for(const key of keys){if((a[key]||0)!==(b[key]||0))return false;}
    return true;
}
function isOpenMentsu(mentsu){
    if(mentsu.type==='kotsu'){
        return state.melds.some(m=>m.length>=3&&m.every(t=>normalizeTileId(t)===mentsu.id));
    }
    if(mentsu.type==='shuntsu'){
        const target=[...mentsu.ids].sort();
        return state.melds.some(m=>m.length===3&&[...m.map(normalizeTileId)].sort().every((id,index)=>id===target[index]));
    }
    return false;
}
function isDeclaredAnkanMentsu(mentsu){return mentsu.type==='kotsu'&&state.ankan.some(t=>normalizeTileId(t)===mentsu.id);}
function getHandDecompositions(tiles){
    const counts={};
    normalizeTiles(tiles).forEach(t=>counts[t.id]=(counts[t.id]||0)+1);
    const decompositions=[];
    for(const pairId of Object.keys(counts)){
        if(counts[pairId]<2)continue;
        const tempCounts={...counts};
        tempCounts[pairId]-=2;
        if(tempCounts[pairId]===0)delete tempCounts[pairId];
        const mentsuOptions=decomposeToMentsu(tempCounts,[]);
        mentsuOptions.forEach(mentsuList=>decompositions.push({pairId,mentsuList}));
    }
    return decompositions;
}
function getWaitTypesForDecomposition(pairId, mentsuList, winTile){
    const waitTypes=new Set();
    const normalizedWinTile=normalizeTile(winTile);
    const winId=normalizedWinTile.id;
    if(pairId===winId)waitTypes.add('tanki');
    for(const mentsu of mentsuList){
        if(mentsu.type!=='shuntsu'||isOpenMentsu(mentsu))continue;
        if(!mentsu.ids.includes(winId))continue;
        const startTile=getTileById(mentsu.ids[0]);
        if(!startTile)continue;
        if(normalizedWinTile.num===startTile.num+1)waitTypes.add('kanchan');
        else if(startTile.num===1&&normalizedWinTile.num===3)waitTypes.add('penchan');
        else if(startTile.num===7&&normalizedWinTile.num===7)waitTypes.add('penchan');
        else waitTypes.add('ryanmen');
    }
    return waitTypes;
}
function checkSuushi(tiles){
    const counts=countTilesById(tiles);
    const windIds=['east','south','west','north'];
    const kotsuCount=windIds.filter(id=>(counts[id]||0)>=3).length;
    const hasPair=windIds.some(id=>(counts[id]||0)===2);
    if(kotsuCount===4)return 2;
    if(kotsuCount===3&&hasPair)return 1;
    return 0;
}

// 修改：渲染可点击删除的牌
function renderInlineTiles(tiles, onClickCallback, isGroupClick = false) {
    if(!tiles.length) return '(无)';
    return tiles.map((t, index) => `
        <img class="tile-inline" 
             src="${tileToSvg(t)}" 
             alt="${t.name}" 
             title="点击删除${isGroupClick?'该组':''}" 
             onclick="${onClickCallback ? `window.${onClickCallback}(${index})` : ''}"
             onerror="this.style.display='none';"/>
    `).join('');
}

function getTileById(id){return allTiles.find(t=>t.id===id)||null;}
function isMenzen(){return state.melds.length===0;}
function getTotalTiles(){let total=state.hand.length;state.melds.forEach(m=>{total+=(m.length===4?3:m.length);});total+=state.ankan.length*3;return total;}

function syncSpecialOptions(showAlert=false){
    const notes=[];
    if(state.isDoubleRiichi){
        if(!isMenzen()){state.isDoubleRiichi=false;notes.push('双立直为门清限定，已自动取消');}
        state.isRiichi=true;
    }

        state.isRiichi=false;
        state.isDoubleRiichi=false;
        notes.push('立直为门清限定，已自动取消');
    }
    if(state.ippatsu&&!state.isRiichi&&!state.isDoubleRiichi){state.ippatsu=false;notes.push('一发需在立直/双立直状态下，已自动取消');}
    if(state.tenhou){
        state.chiihou=false;
        if(state.winType!=='tsumo')notes.push('天和仅限自摸，已自动切换为自摸');

    }
    if(state.chiihou){
        state.tenhou=false;
        if(state.winType!=='tsumo')notes.push('地和仅限自摸，已自动切换为自摸');
        state.winType='tsumo';
        if(isDealer()){state.chiihou=false;notes.push('地和仅限闲家，已自动取消');}
        if(!isMenzen()||state.ankan.length>0){state.chiihou=false;notes.push('地和仅限无副露无杠的门清手，已自动取消');}
    }
    if(state.houtei&&state.winType!=='tsumo'){state.houtei=false;notes.push('岭上开花仅限自摸，已自动取消');}
    if(state.chankan&&state.winType==='tsumo'){state.chankan=false;notes.push('抢杠仅限荣和，已自动取消');}
    if(state.haitei&&state.houtei){state.houtei=false;notes.push('海底/河底与岭上开花不能同时成立，已自动取消岭上开花');}
    if(state.haitei&&state.chankan&&state.winType==='ron'){state.chankan=false;notes.push('河底与抢杠不能同时成立，已自动取消抢杠');}
    if(showAlert&&notes.length)alert(notes.join('\n'));
    const radio=document.querySelector(`input[name="winType"][value="${state.winType}"]`);if(radio)radio.checked=true;
    [['riichi',state.isRiichi],['doubleRiichi',state.isDoubleRiichi],['ippatsu',state.ippatsu],['haitei',state.haitei],['houtei',state.houtei],['chankan',state.chankan],['tenhou',state.tenhou],['chiihou',state.chiihou]].forEach(([id,value])=>{const el=document.getElementById(id);if(el)el.checked=value;});

    savePersistedState();
}
function checkTileCount(tiles){const counts={};for(const t of tiles){counts[t.id]=(counts[t.id]||0)+1;if(counts[t.id]>4){return{valid:false,message:`${t.name} 超过 4 张！`};}}return{valid:true};}
function validateMeld(tiles){if(tiles.length<3||tiles.length>4){return{valid:false,message:'副露必须是 3 张或 4 张牌'};}const allSame=tiles.every(t=>t.id===tiles[0].id);if(allSame){if(tiles.length===3){return{valid:true,type:'碰'};}else if(tiles.length===4){return{valid:true,type:'大明杠'};}}if(tiles.length===3){if(tiles.some(t=>t.type==='honor')){return{valid:false,message:'吃只能是数牌（万/筒/索）'};}const suits=new Set(tiles.map(t=>t.suit));if(suits.size!==1){return{valid:false,message:'吃必须是同花色的牌'};}const nums=tiles.map(t=>t.num).sort((a,b)=>a-b);if(nums[0]+1===nums[1]&&nums[1]+1===nums[2]){return{valid:true,type:'吃'};}return{valid:false,message:'吃必须是连续的 3 张牌（如 234 万）'};}if(tiles.length===4&&!allSame){return{valid:false,message:'4 张牌的副露只能是大明杠（4 张相同牌）'};}return{valid:false,message:'无效的副露牌型'};}

function initTileStock() {
    const stock = {};
    allTiles.forEach(tile => {
        if (tile.red) { stock[tile.id] = 1; } 
        else if (tile.num === 5 && tile.type !== 'honor') { stock[tile.id] = 3; } 
        else { stock[tile.id] = 4; }
    });
    return stock;
}

function getTileStock() {
    const stock = initTileStock();
    state.hand.forEach(tile => { if (stock[tile.id] > 0) stock[tile.id]--; });
    state.melds.forEach(meld => { meld.forEach(tile => { if (stock[tile.id] > 0) stock[tile.id]--; }); });
    state.ankan.forEach(tile => { for (let i = 0; i < 4; i++) { if (stock[tile.id] > 0) stock[tile.id]--; } });
    state.dora.forEach(tile => { if (stock[tile.id] > 0) stock[tile.id]--; });
    state.uradora.forEach(tile => { if (stock[tile.id] > 0) stock[tile.id]--; });
    return stock;
}

// ===== 和牌检查逻辑 =====
function isValidMahjongHand(tiles) {
    if (tiles.length !== 14) return false;
    const normalizedTiles = tiles.map(t => {
        if (t.red && t.num === 5) { return getTileById(`5${t.suit}`); }
        return t;
    });
    return checkMentsuGeneral(normalizedTiles);
}

function checkMentsuGeneral(tiles){
    const counts={};tiles.forEach(t=>counts[t.id]=(counts[t.id]||0)+1);
    const ids=Object.keys(counts);
    for(let i=0;i<ids.length;i++){
        const pairId=ids[i];
        if(counts[pairId]>=2){
            let tempTiles=[...tiles];
            let removed=0;
            for(let k=0;k<tempTiles.length;k++){
                if(tempTiles[k].id===pairId&&removed<2){tempTiles[k]=null;removed++;}
            }
            tempTiles=tempTiles.filter(t=>t!==null);
            if(canDecomposeTo4Mentsu(tempTiles)){return true;}
        }
    }
    return false;
}

function canDecomposeTo4Mentsu(tiles){
    if(tiles.length===0)return true;
    if(tiles.length%3!==0)return false;
    const sorted=[...tiles].sort((a,b)=>{if(a.suit!==b.suit)return(a.suit||'').localeCompare(b.suit||'');return(a.num||0)-(b.num||0);});
    const first=sorted[0];
    const same=sorted.filter(t=>t.id===first.id);
    if(same.length>=3){
        const rest=removeTiles(sorted,[first.id,first.id,first.id]);
        if(canDecomposeTo4Mentsu(rest))return true;
    }
    if(first.type!=='honor'){
        const id2=`${first.num+1}${first.suit}`;
        const id3=`${first.num+2}${first.suit}`;
        const idx2=sorted.findIndex(t=>t.id===id2);
        const idx3=sorted.findIndex(t=>t.id===id3);
        if(idx2>0&&idx3>0){
            const rest=[...sorted];
            rest.splice(0,1);
            const realIdx3=rest.findIndex(t=>t.id===id3);
            rest.splice(realIdx3,1);
            const realIdx2=rest.findIndex(t=>t.id===id2);
            rest.splice(realIdx2,1);
            if(canDecomposeTo4Mentsu(rest))return true;
        }
    }
    return false;
}

function removeTiles(tiles,ids){
    const arr=[...tiles];
    ids.forEach(id=>{const idx=arr.findIndex(t=>t.id===id);if(idx>=0)arr.splice(idx,1);});
    return arr;
}

function isSevenPairs(tiles){
    if(tiles.length!==14)return false;
    const count=countTilesById(tiles);
    return Object.values(count).filter(c=>c===2).length===7;
}

function isKokushiMusou(tiles){
    if(tiles.length!==14)return false;
    const yaochuuIds=allTiles.filter(t=>t.isYaochu).map(t=>t.id);
    const unique=new Set(normalizeTiles(tiles).map(t=>t.id));
    if(unique.size!==13)return false;
    return yaochuuIds.every(id=>unique.has(id));
}

function analyzeTenpai() {
    const baseTiles = getTilesForTenpai();
    const tenpaiTiles = [];
    const stock = getTileStock();
    
    for (const tile of allTiles) {
        if (stock[tile.id] <= 0) continue;
        const testHand = [...baseTiles, tile];
        if (isValidMahjongHand(testHand) || isSevenPairs(testHand) || isKokushiMusou(testHand)) {
            tenpaiTiles.push({ tile: tile, remainCount: stock[tile.id] });
        }
    }
    return tenpaiTiles.length ? tenpaiTiles : [{ tile: { name: '无听牌', id: 'none' }, remainCount: 0 }];
}

// ===== 役种计算逻辑 =====
function checkSuuAnkou(fullHand,winTile){
    if(!isMenzen())return false;
    const counts=countTilesById(fullHand);
    const decomposition=decomposeHandForSuuAnkou(fullHand);
    if(!decomposition)return false;
    if(decomposition.kotsu===4&&decomposition.shuntsu===0&&decomposition.pair===1){
        if(state.winType==='tsumo'){return true;}
        else{return counts[winTile.id]===2;}
    }
    return false;
}

function decomposeHandForSuuAnkou(tiles){
    if(tiles.length===0)return{kotsu:0,shuntsu:0,pair:0};
    return canDecomposeTo4Kotsu(tiles,0,0,0);
}

function canDecomposeTo4Kotsu(tiles,kotsu,shuntsu,pair){
    if(tiles.length===0){return{kotsu,shuntsu,pair};}
    if(kotsu>4||shuntsu>0||pair>1)return null;
    const first=tiles[0];
    if(pair===0){
        const same=tiles.filter(t=>t.id===first.id);
        if(same.length>=2){
            const rest=removeTiles(tiles,[first.id,first.id]);
            const res=canDecomposeTo4Kotsu(rest,kotsu,shuntsu,1);
            if(res)return res;
        }
    }
    const same=tiles.filter(t=>t.id===first.id);
    if(same.length>=3){
        const rest=removeTiles(tiles,[first.id,first.id,first.id]);
        const res=canDecomposeTo4Kotsu(rest,kotsu+1,shuntsu,pair);
        if(res)return res;
    }
    if(first.type!=='honor'){
        const id2=`${first.num+1}${first.suit}`;
        const id3=`${first.num+2}${first.suit}`;
        if(tiles.some(t=>t.id===id2)&&tiles.some(t=>t.id===id3)){
            const rest=removeTiles(tiles,[first.id,id2,id3]);
            const res=canDecomposeTo4Kotsu(rest,kotsu,shuntsu+1,pair);
            if(res)return res;
        }
    }
    return null;
}

function checkPinfu(tiles,winTile){
    const decompositions=getHandDecompositions(tiles);
    for(const {pairId,mentsuList} of decompositions){
        const pairTile=getTileById(pairId);
        if(pairTile&&(pairTile.honor===state.fieldWind||pairTile.honor===state.seatWind||pairTile.isSangen))continue;
        if(mentsuList.every(mentsu=>mentsu.type==='shuntsu')){
            const waitTypes=getWaitTypesForDecomposition(pairId,mentsuList,winTile);
            if(waitTypes.has('ryanmen'))return true;
        }
    }
    return false;
}

function canDecomposeTo4Shuntsu(tiles){
    if(tiles.length===0)return true;
    if(tiles.length%3!==0)return false;
    const sorted=[...tiles].sort((a,b)=>{if(a.suit!==b.suit)return(a.suit||'').localeCompare(b.suit||'');return(a.num||0)-(b.num||0);});
    const first=sorted[0];
    if(first.type==='honor')return false;
    const id2=`${first.num+1}${first.suit}`;
    const id3=`${first.num+2}${first.suit}`;
    const idx2=sorted.findIndex(t=>t.id===id2);
    const idx3=sorted.findIndex(t=>t.id===id3);
    if(idx2>0&&idx3>0){
        const rest=[...sorted];
        rest.splice(0,1);
        const realIdx3=rest.findIndex(t=>t.id===id3);
        rest.splice(realIdx3,1);
        const realIdx2=rest.findIndex(t=>t.id===id2);
        rest.splice(realIdx2,1);
        if(canDecomposeTo4Shuntsu(rest))return true;
    }
    return false;
}

function isRyanmenWaitShape(fullHand,winTile){
    if(winTile.type==='honor')return false;
    const handCopy=[...fullHand];
    let winRemoved=false;
    const tempHand=handCopy.filter(t=>{
        if(!winRemoved&&t.id===winTile.id){winRemoved=true;return false;}
        return true;
    });
    const counts={};
    tempHand.forEach(t=>counts[t.id]=(counts[t.id]||0)+1);
    if(winTile.num>=3){
        const id1=`${winTile.num-2}${winTile.suit}`;
        const id2=`${winTile.num-1}${winTile.suit}`;
        if(counts[id1]>=1&&counts[id2]>=1){if(winTile.num===3){}else{return true;}}
    }
    if(winTile.num<=7){
        const id1=`${winTile.num+1}${winTile.suit}`;
        const id2=`${winTile.num+2}${winTile.suit}`;
        if(counts[id1]>=1&&counts[id2]>=1){if(winTile.num===7){}else{return true;}}
    }
    return false;
}

function calculateYaku(hand,winTile){
    const normalizedWinTile=normalizeTile(winTile);
    const fullHand=normalizeTiles([...getTilesForTenpai(),normalizedWinTile]);
    const yakuList=[];
    let isYakuman=false;
    let yakumanCount=0;
    const menzen=isMenzen();
    const isChiiToi=isSevenPairs(fullHand);
    const suits=['m','p','s'];
    
    for(let suit of suits){
        const suitTiles=fullHand.filter(t=>t.suit===suit);
        if(suitTiles.length===14){
            const counts={};suitTiles.forEach(t=>counts[t.num]=(counts[t.num]||0)+1);
            let isChuren=(counts[1]>=3)&&(counts[9]>=3);
            for(let i=2;i<=8;i++){if(!counts[i]||counts[i]<1)isChuren=false;}
            if(isChuren&&menzen){
                yakuList.push({name:'九莲宝灯',han:13,isYakuman:true});
                isYakuman=true;yakumanCount+=1;break;
            }
        }
    }
    if(checkSuuAnkou(fullHand,normalizedWinTile)){
        const normalizedHand=normalizeTiles(state.hand);
        const isSuuAnkouTanki=normalizedHand.filter(t=>t.id===normalizedWinTile.id).length===1;
        if(isSuuAnkouTanki){
            yakuList.push({name:'四暗刻单骑',han:26,isYakuman:true});
            isYakuman=true;yakumanCount+=2;
        }else{
            yakuList.push({name:'四暗刻',han:13,isYakuman:true});
            isYakuman=true;yakumanCount+=1;
        }
    }
    const sangenCounts={'white':0,'rich':0,'red':0};
    fullHand.forEach(t=>{
        if(t.honor==='haku')sangenCounts.white++;
        if(t.honor==='hatsu')sangenCounts.rich++;
        if(t.honor==='chun')sangenCounts.red++;
    });
    if(sangenCounts.white>=3&&sangenCounts.rich>=3&&sangenCounts.red>=3){
        yakuList.push({name:'大三元',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    if(isKokushiMusou(fullHand)){
        const normalizedHand=normalizeTiles(state.hand);
        const uniqueIds=new Set(normalizedHand.map(t=>t.id));
        if(isMenzen()&&state.melds.length===0&&state.ankan.length===0&&normalizedHand.length===13&&uniqueIds.size===13){
            yakuList.push({name:'国士无双十三面',han:26,isYakuman:true});
            isYakuman=true;yakumanCount+=2;
        }else{
            yakuList.push({name:'国士无双',han:13,isYakuman:true});
            isYakuman=true;yakumanCount+=1;
        }
    }
    const suushiType=checkSuushi(fullHand);
    if(suushiType===2){
        yakuList.push({name:'大四喜',han:26,isYakuman:true});
        isYakuman=true;yakumanCount+=2;
    }else if(suushiType===1){
        yakuList.push({name:'小四喜',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    const kanCount=state.melds.filter(m=>m.length===4).length+state.ankan.length;
    if(kanCount>=4){
        yakuList.push({name:'四杠子',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    if(fullHand.every(t=>t.isYaochu&&t.type!=='honor')){
        yakuList.push({name:'清老头',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    if(fullHand.every(t=>t.type==='honor')){
        yakuList.push({name:'字一色',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    const greenTiles=['2s','3s','4s','6s','8s','rich'];
    if(fullHand.every(t=>greenTiles.includes(t.id))){
        yakuList.push({name:'???',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    if(state.tenhou&&menzen&&state.winType==='tsumo'&&isDealer()&&state.melds.length===0&&state.ankan.length===0){
        yakuList.push({name:'天和',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }
    if(state.chiihou&&menzen&&state.winType==='tsumo'&&!isDealer()&&state.melds.length===0&&state.ankan.length===0){
        yakuList.push({name:'地和',han:13,isYakuman:true});
        isYakuman=true;yakumanCount+=1;
    }

    if(!isYakuman){
        if(state.isDoubleRiichi&&menzen){
            yakuList.push({name:'双立直',han:2});
            if(state.ippatsu)yakuList.push({name:'一发',han:1});
        }else if(state.isRiichi&&menzen){
            yakuList.push({name:'立直',han:1});
            if(state.ippatsu)yakuList.push({name:'一发',han:1});
        }
        if(state.winType==='tsumo'&&menzen)yakuList.push({name:'门清自摸和',han:1});
        if(state.haitei)yakuList.push({name:state.winType==='tsumo'?'海底摸月':'河底捞鱼',han:1});
        if(state.houtei)yakuList.push({name:'岭上开花',han:1});
        if(state.chankan)yakuList.push({name:'抢杠',han:1});
        if(!fullHand.some(t=>t.isYaochu))yakuList.push({name:'断幺九',han:1});

        const honorCounts={};
        fullHand.forEach(t=>{if(t.type==='honor')honorCounts[t.honor]=(honorCounts[t.honor]||0)+1;});
        if(!isChiiToi){
            if(honorCounts[state.fieldWind]>=3)yakuList.push({name:`场风 (${getTileById(state.fieldWind).name})`,han:1});
            if(honorCounts[state.seatWind]>=3)yakuList.push({name:`自风 (${getTileById(state.seatWind).name})`,han:1});
            if(honorCounts['haku']>=3)yakuList.push({name:'役牌 (白)',han:1});
            if(honorCounts['hatsu']>=3)yakuList.push({name:'役牌 (发)',han:1});
            if(honorCounts['chun']>=3)yakuList.push({name:'役牌 (中)',han:1});
        }
        if(!isChiiToi&&menzen){
            if(checkPinfu(fullHand,normalizedWinTile)){yakuList.push({name:'平和',han:1});}
        }
        if(!isChiiToi){
            const iipeikoCount=countIipeiko(fullHand);
            if(iipeikoCount>=2&&menzen){yakuList.push({name:'二杯口',han:3});}
            else if(iipeikoCount>=1&&menzen){yakuList.push({name:'一杯口',han:1});}
            const sanshoku=countSanshokuDoshun(fullHand);
            if(sanshoku>0){yakuList.push({name:'三色同顺',han:menzen?2:1});}
            const ittsuCount=countIttsu(fullHand);
            if(ittsuCount>0){yakuList.push({name:'一气通贯',han:menzen?2:1});}
            const chanta=checkChanta(fullHand);
            if(chanta===2){yakuList.push({name:'纯全带幺九',han:menzen?3:2});}
            else if(chanta===1){yakuList.push({name:'混全带幺九',han:menzen?2:1});}
            const isHonitsu=checkHonitsu(fullHand);
            const isChinitsu=checkChinitsu(fullHand);
            if(isChinitsu){yakuList.push({name:'清一色',han:menzen?6:5});}
            else if(isHonitsu){yakuList.push({name:'混一色',han:menzen?3:2});}
            const toitoi=checkToitoi(fullHand);
            if(toitoi){yakuList.push({name:'对对和',han:2});}
            const sananko=checkSananko(fullHand,state.ankan,normalizedWinTile);
            if(sananko){yakuList.push({name:'三暗刻',han:2});}
            const sanshokuDoko=checkSanshokuDoko(fullHand);
            if(sanshokuDoko){yakuList.push({name:'三色同刻',han:2});}
            if(kanCount>=3){yakuList.push({name:'三杠子',han:2});}
            const shosangen=checkShosangen(fullHand);
            if(shosangen){yakuList.push({name:'小三元',han:2});}
            if(fullHand.every(t=>t.isYaochu)){yakuList.push({name:'混老头',han:2});}
        }
    }
    if(isChiiToi){
        yakuList.push({name:'七对子',han:2});
        if(fullHand.every(t=>t.isYaochu)){yakuList.push({name:'混老头',han:2});}
    }
    return{yakuList,isYakuman,yakumanCount};
}

function countIipeiko(tiles){
    let maxCount=0;
    for(const {mentsuList} of getHandDecompositions(tiles)){
        const shuntsuMap={};
        mentsuList.filter(mentsu=>mentsu.type==='shuntsu').forEach(mentsu=>{
            const startTile=getTileById(mentsu.ids[0]);
            if(!startTile)return;
            const key=`${startTile.num}${startTile.suit}`;
            shuntsuMap[key]=(shuntsuMap[key]||0)+1;
        });
        let count=0;
        for(const key in shuntsuMap){count+=Math.floor(shuntsuMap[key]/2);}
        if(count>maxCount)maxCount=count;
    }
    return maxCount;
}

function countSanshokuDoshun(tiles){
    let maxCount=0;
    for(const {mentsuList} of getHandDecompositions(tiles)){
        const shuntsuSet=new Set();
        mentsuList.filter(mentsu=>mentsu.type==='shuntsu').forEach(mentsu=>{
            const startTile=getTileById(mentsu.ids[0]);
            if(startTile)shuntsuSet.add(`${startTile.num}-${startTile.suit}`);
        });
        let count=0;
        for(let num=1;num<=7;num++){
            if(shuntsuSet.has(`${num}-m`)&&shuntsuSet.has(`${num}-p`)&&shuntsuSet.has(`${num}-s`))count++;
        }
        if(count>maxCount)maxCount=count;
    }
    return maxCount;
}

function countIttsu(tiles){
    for(const {mentsuList} of getHandDecompositions(tiles)){
        for(const suit of['m','p','s']){
            const starts=new Set(mentsuList.filter(mentsu=>mentsu.type==='shuntsu').map(mentsu=>getTileById(mentsu.ids[0])).filter(tile=>tile&&tile.suit===suit).map(tile=>tile.num));
            if(starts.has(1)&&starts.has(4)&&starts.has(7))return 1;
        }
    }
    return 0;
}

function canWinWith5Tiles(tiles){
    if(tiles.length!==5)return false;
    const counts={};
    tiles.forEach(t=>counts[t.num]=(counts[t.num]||0)+1);
    for(let num=1;num<=9;num++){
        if(counts[num]>=2){
            const remaining=tiles.filter((t,idx)=>{
                if(t.num===num&&counts[num]>=2){counts[num]--;return false;}
                return true;
            });
            if(remaining.length===3){
                if(remaining[0].num===remaining[1].num&&remaining[1].num===remaining[2].num)return true;
                if(remaining[0].num+1===remaining[1].num&&remaining[1].num+1===remaining[2].num)return true;
            }
        }
    }
    return false;
}

function checkChanta(tiles){
    if(isSevenPairs(tiles))return 0;
    let best=0;
    for(const {pairId,mentsuList} of getHandDecompositions(tiles)){
        const pairTile=getTileById(pairId);
        if(!pairTile||!pairTile.isYaochu)continue;
        let hasHonor=pairTile.type==='honor';
        let hasSequence=false;
        let valid=true;
        for(const mentsu of mentsuList){
            if(mentsu.type==='kotsu'){
                const tile=getTileById(mentsu.id);
                if(!tile||!tile.isYaochu){valid=false;break;}
                if(tile.type==='honor')hasHonor=true;
            }else if(mentsu.type==='shuntsu'){
                const startTile=getTileById(mentsu.ids[0]);
                if(!startTile||(startTile.num!==1&&startTile.num!==7)){valid=false;break;}
                hasSequence=true;
            }
        }
        if(valid&&hasSequence)best=Math.max(best,hasHonor?1:2);
    }
    return best;
}

function checkHonitsu(tiles){
    const normalized=normalizeTiles(tiles);
    const suits=new Set(normalized.filter(t=>t.suit).map(t=>t.suit));
    const hasHonor=normalized.some(t=>t.type==='honor');
    return suits.size===1&&hasHonor;
}

function checkChinitsu(tiles){
    const normalized=normalizeTiles(tiles);
    const suits=new Set(normalized.filter(t=>t.suit).map(t=>t.suit));
    const hasHonor=normalized.some(t=>t.type==='honor');
    return suits.size===1&&!hasHonor;
}

function checkToitoi(tiles){
    for(const {mentsuList} of getHandDecompositions(tiles)){
        if(mentsuList.every(mentsu=>mentsu.type==='kotsu'))return true;
    }
    return 0;
}

function checkSananko(fullHand,ankan,winTile){
    let baseAnko=ankan.length;
    const handCounts=countTilesById(state.hand);
    const fullCounts=countTilesById(fullHand);
    const ids=Object.keys(fullCounts).sort();
    for(let i=0;i<ids.length;i++){
        const pairId=ids[i];
        if(fullCounts[pairId]<2)continue;
        const tempCounts={...fullCounts};
        tempCounts[pairId]-=2;
        if(tempCounts[pairId]===0)delete tempCounts[pairId];
        const maxAnko=decomposeForMaxSanAnko(tempCounts,handCounts,0,baseAnko,winTile);
        if(maxAnko>=3)return true;
    }
    return false;
}

function decomposeForMaxSanAnko(counts,handCounts,currentAnko,baseAnko,winTile){
    if(Object.keys(counts).length===0){return baseAnko+currentAnko;}
    const firstId=Object.keys(counts).sort()[0];
    const tile=getTileById(firstId);
    if(!tile)return 0;
    const count=counts[firstId];
    let maxAnko=0;
    if(count>=3){
        let isAnko=true;
        if(state.winType==='ron'&&tile.id===winTile.id){
            const handCount=handCounts[tile.id]||0;
            if(handCount<3){isAnko=false;}
        }
        const newCounts={...counts};
        newCounts[firstId]-=3;
        if(newCounts[firstId]===0)delete newCounts[firstId];
        const result=decomposeForMaxSanAnko(newCounts,handCounts,currentAnko+(isAnko?1:0),baseAnko,winTile);
        maxAnko=Math.max(maxAnko,result);
    }
    if(tile.type!=='honor'&&tile.num<=7){
        const id2=`${tile.num+1}${tile.suit}`;
        const id3=`${tile.num+2}${tile.suit}`;
        if(counts[id2]&&counts[id3]){
            const newCounts={...counts};
            newCounts[firstId]--;newCounts[id2]--;newCounts[id3]--;
            if(newCounts[firstId]===0)delete newCounts[firstId];
            if(newCounts[id2]===0)delete newCounts[id2];
            if(newCounts[id3]===0)delete newCounts[id3];
            const result=decomposeForMaxSanAnko(newCounts,handCounts,currentAnko,baseAnko,winTile);
            maxAnko=Math.max(maxAnko,result);
        }
    }
    return maxAnko;
}

function checkSanshokuDoko(tiles){
    const counts=countTilesById(tiles);
    for(let num=1;num<=9;num++){
        const mCount=counts[`${num}m`]||0;
        const pCount=counts[`${num}p`]||0;
        const sCount=counts[`${num}s`]||0;
        if(mCount>=3&&pCount>=3&&sCount>=3)return true;
    }
    return false;
}

function checkShosangen(tiles){
    if(isSevenPairs(tiles))return false;
    const sangenCounts={'white':0,'rich':0,'red':0};
    normalizeTiles(tiles).forEach(t=>{
        if(t.honor==='haku')sangenCounts.white++;
        if(t.honor==='hatsu')sangenCounts.rich++;
        if(t.honor==='chun')sangenCounts.red++;
    });
    const kotsuCount=Object.values(sangenCounts).filter(c=>c>=3).length;
    const hasPair=Object.values(sangenCounts).some(c=>c===2);
    return kotsuCount>=2&&hasPair;
}

function calculateDoraCount(winTile){
    let count=0;
    const indicators=[...state.dora,...(state.isRiichi?state.uradora:[])];
    const doraTiles=indicators.map(ind=>{
        if(ind.type==='honor'){
            const windOrder=['east','south','west','north'];
            const dragonOrder=['white','rich','red'];
            if(windOrder.includes(ind.id)){
                const idx=windOrder.findIndex(id=>id===ind.id);
                return getTileById(windOrder[(idx+1)%4]);
            }
            const idx=dragonOrder.findIndex(id=>id===ind.id);
            return getTileById(dragonOrder[(idx+1)%3]);
        }else{
            const num=ind.num===9?1:ind.num+1;
            return allTiles.find(t=>t.suit===ind.suit&&t.num===num&&!t.red);
        }
    }).filter(Boolean);
    const fullHandForDora=getAllTiles();
    const redTilesInHand={};
    fullHandForDora.forEach(t=>{
        if(t.red){
            if(!redTilesInHand[t.suit]){redTilesInHand[t.suit]=true;count++;}
        }
    });
    state.ankan.forEach(tile=>{
        if(tile.num===5&&tile.type!=='honor'){
            if(!redTilesInHand[tile.suit]){redTilesInHand[tile.suit]=true;count++;}
        }
    });
    fullHandForDora.forEach(t=>{
        if(t.red)return;
        if(doraTiles.some(d=>d.id===t.id)){count++;}
    });
    if(winTile.red){
        if(!redTilesInHand[winTile.suit]){count++;}
    }else{
        if(doraTiles.some(d=>d.id===winTile.id)){count++;}
    }
    return count;
}

// ===== 符数计算逻辑 =====

function calculateFu(winTile, yakuResult) {
    if (yakuResult.isYakuman) return 0;
    const fullHand = [...getTilesForTenpai(), normalizeTile(winTile)];
    if (isSevenPairs(fullHand)) return 25;
    
    const isPinfu = yakuResult.yakuList.some(y => y.name === '平和');
    if (isPinfu) { return state.winType === 'tsumo' ? 20 : 30; }

    const handCounts = countTilesById(state.hand);
    
    // 寻找所有可能的分解方式，并计算最大符数（针对当前听牌张）
    const maxFu = findMaxFuDecomposition(fullHand, handCounts, winTile);
    return maxFu;
}

function findMaxFuDecomposition(tiles, handCounts, winTile) {
    const normalizedTiles = tiles.map(t => {
        if (t.red && t.num === 5) { return getTileById(`5${t.suit}`); }
        return t;
    });

    const counts = {};
    normalizedTiles.forEach(t => counts[t.id] = (counts[t.id] || 0) + 1);
    
    let maxFu = 0;
    const ids = Object.keys(counts);
    
    for (const pairId of ids) {
        if (counts[pairId] >= 2) {
            const tempCounts = {...counts};
            tempCounts[pairId] -= 2;
            if (tempCounts[pairId] === 0) delete tempCounts[pairId];
            
            const decomps = decomposeToMentsu(tempCounts, []);
            
            for (const decomp of decomps) {
                const fu = calculateFuFromDecomposition(pairId, decomp, handCounts, winTile);
                if (fu > maxFu) maxFu = fu;
            }
        }
    }
    
    if (maxFu === 0) return 20;
    
    maxFu = Math.ceil(maxFu / 10) * 10;
    return maxFu < 20 ? 20 : maxFu;
}

function decomposeToMentsu(counts, currentMentsu) {
    if (Object.keys(counts).length === 0) { return [currentMentsu]; }
    if (currentMentsu.length >= 4) { return []; }
    
    const firstId = Object.keys(counts).sort()[0];
    const tile = getTileById(firstId);
    if (!tile) return [];
    
    const count = counts[firstId];
    let results = [];
    
    if (tile.type !== 'honor' && tile.num <= 7) {
        const id2 = `${tile.num + 1}${tile.suit}`;
        const id3 = `${tile.num + 2}${tile.suit}`;
        if (counts[id2] && counts[id3]) {
            const newCounts = {...counts};
            newCounts[firstId]--; newCounts[id2]--; newCounts[id3]--;
            if (newCounts[firstId] === 0) delete newCounts[firstId];
            if (newCounts[id2] === 0) delete newCounts[id2];
            if (newCounts[id3] === 0) delete newCounts[id3];
            const subResults = decomposeToMentsu(newCounts, [...currentMentsu, {type:'shuntsu', ids:[firstId, id2, id3]}]);
            results = results.concat(subResults);
        }
    }
    
    if (count >= 3) {
        const newCountsKotsu = {...counts};
        newCountsKotsu[firstId] -= 3;
        if (newCountsKotsu[firstId] === 0) delete newCountsKotsu[firstId];
        const subResultsKotsu = decomposeToMentsu(newCountsKotsu, [...currentMentsu, {type:'kotsu', id:firstId, count:3}]);
        results = results.concat(subResultsKotsu);
    }
    
    return results;
}

function calculateFuFromDecomposition(pairId, mentsuList, handCounts, winTile) {
    let fu = 20;
    const menzen = isMenzen();
    if (menzen && state.winType === 'ron') fu += 10;
    if (state.winType === 'tsumo') fu += 2;
    const normalizedWinId = normalizeTileId(winTile);
    
    const pairTile = getTileById(pairId);
    if (pairTile) {
        if (pairTile.honor === state.fieldWind && pairTile.honor === state.seatWind) fu += 4;
        else if (pairTile.honor === state.fieldWind || pairTile.honor === state.seatWind) fu += 2;
        else if (pairTile.isSangen) fu += 2;
    }
    
    for (const mentsu of mentsuList) {
        if (mentsu.type === 'kotsu') {
            const tile = getTileById(mentsu.id);
            if (!tile) continue;
            
            const isMelded = isOpenMentsu(mentsu);
            const isDeclaredAnkan = isDeclaredAnkanMentsu(mentsu);
            const normalizedHandCount = handCounts[mentsu.id] || 0;
            const isRonKotsu = state.winType === 'ron' && !isMelded && !isDeclaredAnkan && mentsu.id === normalizedWinId && normalizedHandCount === 2;
            
            if (isDeclaredAnkan) { 
                fu += tile.isYaochu ? 32 : 16; 
            }
            else if (isMelded || isRonKotsu) { 
                const meld = state.melds.find(m => m.every(t => (t.red && t.num === 5 ? `5${t.suit}` : t.id) === mentsu.id));
                if (meld && meld.length === 4) {
                    fu += tile.isYaochu ? 32 : 16;
                } else {
                    fu += tile.isYaochu ? 4 : 2;
                }
            }
            else {
                fu += tile.isYaochu ? 8 : 4; 
            }
        }
    }
    
    const waitTypes = getWaitTypesForDecomposition(pairId, mentsuList, winTile);
    if (waitTypes.has('kanchan') || waitTypes.has('penchan') || waitTypes.has('tanki')) fu += 2;
    if (!menzen && state.winType === 'ron' && fu === 20) fu = 30;
    
    return fu;
}

function getWaitType(hand, winTile) {
    if (!winTile) return null;
    const fullHand = normalizeTiles([...hand, winTile]);
    const found = new Set();
    for (const {pairId, mentsuList} of getHandDecompositions(fullHand)) {
        getWaitTypesForDecomposition(pairId, mentsuList, winTile).forEach(type => found.add(type));
    }
    return ['tanki', 'kanchan', 'penchan', 'ryanmen'].find(type => found.has(type)) || null;
}

function calculatePoints(han,fu,isYakuman,yakumanCount){
    const dealer=isDealer();
    const isTsumo=state.winType==='tsumo';
    const honba=Math.max(0,parseInt(state.honbaCount||0,10)||0);
    const kyotaku=Math.max(0,parseInt(state.kyotakuCount||0,10)||0);
    const buildDescNote=()=>{
        const parts=[];
        if(honba>0)parts.push(`${honba}\u672c\u573a`);
        if(kyotaku>0)parts.push(`\u53e6\u52a0${kyotaku}\u4f9b\u6258`);
        return parts.length?`\uff08${parts.join('\uff0c')}\uff09`:'';
    };
    const applyBonuses=(result)=>{
        const note=buildDescNote();
        if(result.type==='ron'){
            const ron=result.ron+honba*300;
            return{desc:`\u8363\u548c\uff1a${ron} \u70b9${note}`,total:ron+kyotaku*1000,payments:{ron}};
        }
        if(result.type==='tsumo-dealer'){
            const perPerson=result.perPerson+honba*100;
            return{desc:`\u81ea\u6478\uff1a${perPerson}\u70b9\uff08\u5168\u5458\uff09${note}`,total:perPerson*3+kyotaku*1000,payments:{all:perPerson}};
        }
        const childPay=result.childPay+honba*100;
        const dealerPay=result.dealerPay+honba*100;
        return{desc:`\u81ea\u6478\uff1a${childPay}/${dealerPay} \u70b9${note}`,total:childPay*2+dealerPay+kyotaku*1000,payments:{child:childPay,dealer:dealerPay}};
    };
    if(!isYakuman&&han<=0)return{desc:'\u65e0\u5f79\uff0c\u4e0d\u80fd\u548c\u724c',total:0};
    if(isYakuman||han>=13){
        const count=isYakuman?yakumanCount:1;
        if(isTsumo){
            if(dealer)return applyBonuses({type:'tsumo-dealer',perPerson:16000*count});
            return applyBonuses({type:'tsumo-nondealer',childPay:8000*count,dealerPay:16000*count});
        }
        return applyBonuses({type:'ron',ron:dealer?48000*count:32000*count});
    }
    if(han>=11){
        if(isTsumo){
            if(dealer)return applyBonuses({type:'tsumo-dealer',perPerson:12000});
            return applyBonuses({type:'tsumo-nondealer',childPay:6000,dealerPay:12000});
        }
        return applyBonuses({type:'ron',ron:dealer?36000:24000});
    }
    if(han>=8){
        if(isTsumo){
            if(dealer)return applyBonuses({type:'tsumo-dealer',perPerson:8000});
            return applyBonuses({type:'tsumo-nondealer',childPay:4000,dealerPay:8000});
        }
        return applyBonuses({type:'ron',ron:dealer?24000:16000});
    }
    if(han>=6){
        if(isTsumo){
            if(dealer)return applyBonuses({type:'tsumo-dealer',perPerson:6000});
            return applyBonuses({type:'tsumo-nondealer',childPay:3000,dealerPay:6000});
        }
        return applyBonuses({type:'ron',ron:dealer?18000:12000});
    }
    if(han>=5||(han===4&&fu>=40)||(han===3&&fu>=70)){
        if(isTsumo){
            if(dealer)return applyBonuses({type:'tsumo-dealer',perPerson:4000});
            return applyBonuses({type:'tsumo-nondealer',childPay:2000,dealerPay:4000});
        }
        return applyBonuses({type:'ron',ron:dealer?12000:8000});
    }
    const dealerRonTable={1:{30:1500,40:2000,50:2400,60:2900,70:3400,80:3900,90:4400,100:4800,110:5300},2:{25:2400,30:2900,40:3900,50:4800,60:5800,70:6800,80:7700,90:8700,100:9600,110:10600},3:{25:4800,30:5800,40:7700,50:9600,60:11600},4:{25:9600,30:11600}};
    const dealerTsumoTable={1:{30:[500,500],40:[700,700],50:[800,800],60:[1000,1000],70:[1200,1200],80:[1300,1300],90:[1500,1500],100:[1600,1600],110:[1800,1800]},2:{25:[800,800],30:[1000,1000],40:[1300,1300],50:[1600,1600],60:[2000,2000],70:[2300,2300],80:[2600,2600],90:[2900,2900],100:[3200,3200],110:[3600,3600]},3:{25:[1600,1600],30:[2000,2000],40:[2600,2600],50:[3200,3200],60:[3900,3900]},4:{25:[3200,3200],30:[3900,3900]}};
    const nonDealerRonTable={1:{30:1000,40:1300,50:1600,60:2000,70:2300,80:2600,90:2900,100:3200,110:3600},2:{25:1600,30:2000,40:2600,50:3200,60:3900,70:4500,80:5200,90:5800,100:6400,110:7100},3:{25:3200,30:3900,40:5200,50:6400,60:7700},4:{25:6400,30:7700}};
    const nonDealerTsumoTable={1:{30:[300,500],40:[400,700],50:[400,800],60:[500,1000],70:[600,1200],80:[700,1300],90:[800,1500],100:[800,1600],110:[900,1800]},2:{25:[400,700],30:[500,1000],40:[700,1300],50:[800,1600],60:[1000,2000],70:[1200,2300],80:[1300,2600],90:[1500,2900],100:[1600,3200],110:[1800,3600]},3:{25:[800,1600],30:[1000,2000],40:[1300,2600],50:[1600,3200],60:[2000,3900]},4:{25:[1600,3200],30:[2000,3900]}};
    const normalizedFu=Math.ceil(fu/10)*10;
    if(dealer){
        if(isTsumo){
            const tsumoPoints=dealerTsumoTable[han]?.[normalizedFu];
            if(tsumoPoints)return applyBonuses({type:'tsumo-dealer',perPerson:tsumoPoints[0]});
        }else{
            const ronPoints=dealerRonTable[han]?.[normalizedFu];
            if(ronPoints)return applyBonuses({type:'ron',ron:ronPoints});
        }
    }else{
        if(isTsumo){
            const tsumoPoints=nonDealerTsumoTable[han]?.[normalizedFu];
            if(tsumoPoints)return applyBonuses({type:'tsumo-nondealer',childPay:tsumoPoints[0],dealerPay:tsumoPoints[1]});
        }else{
            const ronPoints=nonDealerRonTable[han]?.[normalizedFu];
            if(ronPoints)return applyBonuses({type:'ron',ron:ronPoints});
        }
    }
    const base=fu*Math.pow(2,han+2);
    if(isTsumo){
        if(dealer){
            const perPerson=Math.ceil(base*2/100)*100;
            return applyBonuses({type:'tsumo-dealer',perPerson});
        }
        const childPay=Math.ceil(base/100)*100;
        const dealerPay=Math.ceil(base*2/100)*100;
        return applyBonuses({type:'tsumo-nondealer',childPay,dealerPay});
    }
    const ron=Math.ceil(base*(dealer?6:4)/100)*100;
    return applyBonuses({type:'ron',ron});
}

function calculate(){
    syncSpecialOptions(true);
    const totalTiles=getTotalTiles();
    if(totalTiles!==13){
        alert(`\u5f53\u524d\u603b\u724c\u6570\u4e3a ${totalTiles} \u5f20\uff0c\u8bf7\u8c03\u6574\u624b\u724c\u6216\u526f\u9732\uff0c\u4f7f\u603b\u6570\u4e3a 13 \u5f20\u3002\n\n\u6ce8\u610f\uff1a\u5927\u660e\u6760\u548c\u6697\u6760\u90fd\u7b97 3 \u5f20\u540d\u989d\uff08\u56e0\u4e3a\u5cad\u4e0a\u6478\u724c\uff09`);
        return;
    }
    
    const waits=analyzeTenpai();
    const resultSection=document.getElementById('resultSection');
    const resultContent=document.getElementById('resultContent');
    resultSection.style.display='block';
    resultContent.innerHTML='';
    
    if(waits.length===1&&waits[0].tile.id==='none'){
        resultContent.innerHTML=`<div class="result-item"><h4>\u542c\u724c\u7ed3\u679c</h4><div class="point-text">\u5f53\u524d\u65e0\u542c\u724c</div></div>`;
        return;
    }
    
    let yakuWaitCount=0;
    waits.forEach(wait => {
        const tile = wait.tile;
        const yakuRes = calculateYaku(state.hand, tile);
        const doraCount = calculateDoraCount(tile);
        
        if(yakuRes.yakuList.some(y=>y.name==='\u4e5d\u83b2\u5b9d\u706f')){
            if(waits.length===9){
                yakuRes.yakuList=yakuRes.yakuList.filter(y=>y.name!=='\u4e5d\u83b2\u5b9d\u706f');
                yakuRes.yakuList.push({name:'\u7eaf\u6b63\u4e5d\u83b2\u5b9d\u706f',han:26,isYakuman:true});
                yakuRes.isYakuman=true;
                yakuRes.yakumanCount=2;
            }
        }
        
        const hasScoringYaku=yakuRes.isYakuman||yakuRes.yakuList.length>0;
        const han = hasScoringYaku && !yakuRes.isYakuman ? yakuRes.yakuList.reduce((sum,y)=>sum+y.han,0) + doraCount : 0;
        const fu = hasScoringYaku ? calculateFu(tile, yakuRes) : 0;
        const pointsRes = hasScoringYaku ? calculatePoints(han, fu, yakuRes.isYakuman, yakuRes.yakumanCount) : {desc:'\u65e0\u5f79\uff0c\u4e0d\u80fd\u548c\u724c',total:0};
        const yakuText = [...yakuRes.yakuList.map(x=>`${x.name}${x.isYakuman?'':`(${x.han} \u7ffb)`}`),(doraCount>0?`\u5b9d\u724c/\u91cc\u5b9d\u724c/\u8d64\u5b9d\u724c (${doraCount} \u7ffb)`:'')].filter(Boolean).join('\uff0c');
        const isYakumanClass = yakuRes.isYakuman ? 'yakuman' : '';
        const fuText = hasScoringYaku && !yakuRes.isYakuman ? `,${fu}\u7b26` : '';
        const hanText = yakuRes.isYakuman ? `\u5f79\u6ee1` : hasScoringYaku ? `${han} \u7ffb` : '\u65e0\u5f79';
        const remainHtml = wait.remainCount > 0 ? `<span class="remain-count">\u5269\u4f59${wait.remainCount}\u5f20</span>` : '';
        const extraNote = hasScoringYaku ? '' : '<div class="yaku-list">\u8bf4\u660e\uff1a\u5b9d\u724c\u53ea\u80fd\u52a0\u7ffb\uff0c\u4e0d\u80fd\u5355\u72ec\u6784\u6210\u548c\u724c\u5f79\uff1b\u6b64\u5f20\u5c5e\u4e8e\u5f62\u5f0f\u542c\u724c\u3002</div>';
        if(hasScoringYaku)yakuWaitCount++;
        
        resultContent.innerHTML += `<div class="result-item ${isYakumanClass}">
            <h4>\u548c\u724c\u5f20\uff1a${tile.name} ${yakuRes.isYakuman?'<span class="yakuman-tag">\u5f79\u6ee1</span>':''} ${remainHtml}</h4>
            <div class="point-text">\u542c\u724c\uff1a${renderInlineTiles([tile])}</div>
            <div class="point-text">\u756a\u6570\uff1a<span class="point-value">${hanText}</span>${fuText}</div>
            <div class="point-text" style="font-size: 20px; color: #c0392b; margin-top: 10px;">${pointsRes.desc}</div>
            <div class="yaku-list">\u5f79\u79cd\uff1a${yakuText||'\uff08\u65e0\uff09'}</div>
            ${extraNote}
        </div>`;
    });
    if(yakuWaitCount===0){
        resultContent.innerHTML = `<div class="result-item"><h4>\u542c\u724c\u7ed3\u679c</h4><div class="point-text">\u5f53\u524d\u4e3a\u5f62\u5f0f\u542c\u724c\uff1a\u724c\u5f62\u53ef\u548c\uff0c\u4f46\u6240\u6709\u548c\u724c\u5f20\u5747\u65e0\u5f79\u3002</div><div class="yaku-list">\u63d0\u793a\uff1a\u9700\u8981\u81f3\u5c11 1 \u4e2a\u548c\u724c\u5f79\uff1b\u5b9d\u724c\u4e0d\u80fd\u5355\u72ec\u548c\u724c\u3002</div></div>` + resultContent.innerHTML;
    }
}

function bindButtons(){
    document.getElementById('clearHand').addEventListener('click',()=>{state.hand=[];updateHandDisplay();});
    document.getElementById('addMeld').addEventListener('click',addMeld);
    document.getElementById('clearMeld').addEventListener('click',()=>{state.melds=[];selectedForMeld=[];updateMeldArea();syncSpecialOptions();});
    document.getElementById('addAnkan').addEventListener('click',addAnkan);
    document.getElementById('clearAnkan').addEventListener('click',()=>{state.ankan=[];selectedForAnkan=null;updateAnkanDisplay();syncSpecialOptions();});
    // 新增：宝牌清空按钮绑定
    document.getElementById('clearDora').addEventListener('click',()=>{state.dora=[];updateDoraDisplay();});
    document.getElementById('clearUradora').addEventListener('click',()=>{state.uradora=[];updateUradoraDisplay();});
    document.getElementById('calculate').addEventListener('click',calculate);
}

function init(){
    loadPersistedState();
    initTileSelectors();
    initWindSelectors();
    bindButtons();
    syncSpecialOptions();
    updateHandDisplay();
    updateMeldArea();
    updateAnkanDisplay();
    updateDoraDisplay();
    updateUradoraDisplay();
}
init();
</script>
